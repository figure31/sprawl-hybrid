<script>
(() => {
  // --- State ---
  // selectedId is the link the user clicked. hoverId is which meta line is
  // currently hovered. view is the SVG viewBox rectangle (for zoom/pan).
  // nodePositions caches the xy pixel position of each rendered node so the
  // framing / zoom code doesn't have to re-layout.
  const state = {
    links: [],
    byId: {},
    childrenByParent: {},   // parentId → sorted children (for keyboard nav)
    entities: [],
    entitiesById: {},
    selectedId: null,
    hoverId: null,
    view: { x: 0, y: 0, w: 0, h: 0 },
    nodePositions: {},
    // Collection state. Populated in loadAll from Goldsky. Used to:
    //  - render collected nodes as squares in the tree (vs circles otherwise)
    //  - append `COLLECTED BY <owner>` to the text-column meta line
    collectedLinkOwner: new Map(),   // linkId → owner address
    nameByAddr: new Map(),           // address → registered name (for display)
    // Vote state. Populated when the wallet is connected and is a
    // registered citizen; used to hide the VOTE affordance from
    // unregistered visitors and from links the viewer has already
    // voted on.
    votedLinkIds: new Set(),         // Set<linkId>
    voterRegistered: false,          // is the connected wallet a citizen?
    lastVoterAddr: null,             // tracks which wallet votedLinkIds is for
  };

  // How many ancestors to frame after a click. The user can wheel-zoom out to
  // see the whole tree, or wheel-zoom in closer.
  const AUTO_FRAME_COUNT = 15;

  // Breathing room around the tree in full-tree view. Used by frameFullTree
  // and by the wheel-zoom cap so the max zoom-out matches the load view.
  const FULL_TREE_PAD = 16;

  // Link id that the homepage and the SPRAWL menu button default to on
  // load. Picks a curated branch the operator wants new visitors to
  // see first. Falls back to the longest branch if the id doesn't
  // exist. The RESET button intentionally ignores this and always
  // shows the longest branch.
  const FEATURED_TIP_ID = "23";

  // --- Data loading (hybrid: AWS API for off-chain content, Goldsky for
  // citizen names and on-chain state). Normalizes API data into the
  // subgraph-shape the rest of this page expects.
  async function loadAll() {
    // Tree metadata only — no text body. Link text is fetched lazily when
    // a reader selects a link (via /links/{id}/context, which also returns
    // the full ancestry in one call). At scale this cuts the initial
    // payload roughly 10x (was 2000 full links ≈ 2MB of text; now ~100
    // bytes per row, so the same 2000 links is ~200KB).
    const [linksResp, entsResp, citizens, collectedLinks] = await Promise.all([
      SprawlAPI.feedTree(2000),
      SprawlAPI.entities(1000),
      SprawlGraph.citizens(1000),
      SprawlGraph.collectedAssets(1000, "Link"),
    ]);
    const rawLinks = (linksResp && linksResp.items) || [];
    const rawEnts  = (entsResp  && entsResp.items)  || [];
    const citById  = Object.fromEntries((citizens || []).map(c => [c.id.toLowerCase(), c]));

    // Populate collection + name maps on state so renderers can resolve
    // `linkId → owner` and `owner-address → username` cheaply.
    state.collectedLinkOwner = new Map(
      (collectedLinks || []).map(a => [String(a.nativeId), (a.owner || "").toLowerCase()])
    );
    state.nameByAddr = new Map(
      (citizens || []).map(c => [c.id.toLowerCase(), c.name])
    );
    // Total registered citizens (including those who haven't written
    // anything yet). Used by the homepage's AUTHORS stat — matches
    // what the AUTHORS page shows.
    state.citizenCount = (citizens || []).length;

    // Reshape each link into the legacy "subgraph" shape so the rendering
    // code below works unchanged.
    const reshape = (l) => {
      const addr     = (l.author || "").toLowerCase();
      const cit      = citById[addr];
      const linkId   = String(l.linkId);
      const parentId = String(l.parentId ?? "0");
      // Only link 0 (genesis) has no parent. Every other link has a
      // parent — even when parentId === "0", it just means genesis is
      // the parent.
      const isGenesis = linkId === "0";
      return {
        id:          linkId,
        text:        l.text || "",
        isRecap:     !!l.isRecap,
        voteCount:   l.voteCount || 0,
        blockNumber: l.createdAt || l.authoredAt || 0,
        timestamp:   l.authoredAt || 0,
        cleared:     !!l.cleared,
        parent:      isGenesis ? null : { id: parentId },
        author:      { id: addr, name: cit ? cit.name : "" },
      };
    };
    const allLinks = rawLinks.map(reshape);

    // Recaps hidden from the UI; if a non-recap's parent is a recap,
    // pass through to the recap's own parent so the tree stays connected.
    const allById = Object.fromEntries(allLinks.map(l => [l.id, l]));
    const effectiveParent = (link) => {
      let p = link.parent ? allById[link.parent.id] : null;
      while (p && p.isRecap) {
        p = p.parent ? allById[p.parent.id] : null;
      }
      return p ? { id: p.id } : null;
    };
    state.links = allLinks
      .filter(l => !l.isRecap)
      .map(l => ({ ...l, parent: effectiveParent(l) }));
    state.byId = Object.fromEntries(state.links.map(l => [l.id, l]));

    // Entities normalized to subgraph shape (just id/name/type/description/creator).
    state.entities = rawEnts.map(e => {
      const addr = (e.creator || "").toLowerCase();
      const cit  = citById[addr];
      return {
        id:          e.entityId,
        name:        e.name,
        entityType:  e.entityType,
        description: e.description,
        creator:     { id: addr, name: cit ? cit.name : "" },
      };
    });
    state.entitiesById = Object.fromEntries(state.entities.map(e => [e.id, e]));

    // Build parent → children map for O(1) keyboard navigation lookups.
    state.childrenByParent = {};
    for (const l of state.links) {
      const pid = l.parent ? l.parent.id : "__root__";
      if (!state.childrenByParent[pid]) state.childrenByParent[pid] = [];
      state.childrenByParent[pid].push(l);
    }
    for (const k in state.childrenByParent) {
      state.childrenByParent[k].sort((a, b) => Number(a.id) - Number(b.id));
    }
  }

  // --- Tree construction and layout ---
  function buildTree() {
    const nodes = {};
    for (const l of state.links) nodes[l.id] = { ...l, children: [] };
    let root = null;
    for (const l of state.links) {
      const node = nodes[l.id];
      if (l.parent) nodes[l.parent.id].children.push(node);
      else root = node;
    }
    // Sort children by id so layout is stable.
    const sort = (n) => {
      n.children.sort((a, b) => Number(a.id) - Number(b.id));
      n.children.forEach(sort);
    };
    if (root) sort(root);
    return root;
  }

  // Compute subtree widths (in tip-units), then x positions.
  function layoutTree(root) {
    const width = (n) => {
      if (!n.children.length) { n.width = 1; return 1; }
      let w = 0;
      for (const c of n.children) w += width(c);
      n.width = w;
      return w;
    };
    const assign = (n, depth, startX) => {
      n.depth = depth;
      if (!n.children.length) { n.x = startX + 0.5; return; }
      let cursor = startX;
      for (const c of n.children) {
        assign(c, depth + 1, cursor);
        cursor += c.width;
      }
      n.x = (n.children[0].x + n.children[n.children.length - 1].x) / 2;
    };
    width(root);
    assign(root, 0, 0);
    return root;
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function flatten(root) {
    const nodes = [], edges = [];
    const walk = (n) => {
      nodes.push(n);
      for (const c of n.children) { edges.push([n, c]); walk(c); }
    };
    walk(root);
    return { nodes, edges };
  }

  function renderTree() {
    if (!state.links.length) return;
    const root = layoutTree(buildTree());
    const { nodes, edges } = flatten(root);

    const svg = document.getElementById("tree-svg");
    const rect = svg.getBoundingClientRect();
    const W = Math.max(100, rect.width);
    const H = Math.max(100, rect.height);

    const treeWidth = root.width;
    const maxDepth = Math.max(...nodes.map(n => n.depth));
    const mx = 8, my = 8;
    const availW = Math.max(1, W - 2 * mx);
    const availH = Math.max(1, H - 2 * my);

    const xToPx = (x) => {
      if (treeWidth <= 1) return W / 2;
      // x is in [0.5 .. treeWidth - 0.5]; normalize.
      return mx + ((x - 0.5) / (treeWidth - 1)) * availW;
    };
    const yToPx = (d) => {
      if (maxDepth === 0) return my;
      return my + (d / maxDepth) * availH;
    };

    // Density-adaptive scaling: as tips pack more tightly (smaller viewport
    // or bigger tree), circles shrink and lines get thinner, keeping the tree
    // legible without visual crowding.
    const colSpacing = treeWidth > 1 ? availW / (treeWidth - 1) : availW;
    const rowSpacing = maxDepth > 0 ? availH / maxDepth : availH;
    const minSpacing = Math.min(colSpacing, rowSpacing);
    const nodeR = clamp(minSpacing * 0.09, 1.2, 5);
    state.nodeR = nodeR;   // stored so updateTreeSelection can size the highlighted node
    const strokeW = clamp(minSpacing * 0.022, 0.4, 1.2);
    svg.style.setProperty("--stroke", strokeW);

    // Clear. The viewBox will be set by frameFullTree / frameAncestors; we
    // just remember the rendered pixel size so those framers can compute a
    // sensible default.
    state.nodePositions = {};
    while (svg.firstChild) svg.removeChild(svg.firstChild);

    const NS = "http://www.w3.org/2000/svg";

    // Edges. dataset.child = the child id, so the selection-update pass can
    // toggle .in-path without touching layout. --depth and --length feed
    // the boot animation: dashoffset sweeps along the line's own length,
    // staggered by the child's depth in the tree.
    for (const [p, c] of edges) {
      const x1 = xToPx(p.x), y1 = yToPx(p.depth);
      const x2 = xToPx(c.x), y2 = yToPx(c.depth);
      const line = document.createElementNS(NS, "line");
      line.setAttribute("x1", x1);
      line.setAttribute("y1", y1);
      line.setAttribute("x2", x2);
      line.setAttribute("y2", y2);
      line.setAttribute("class", "edge");
      line.dataset.child = c.id;
      line.style.setProperty("--depth", c.depth);
      line.style.setProperty("--length", Math.hypot(x2 - x1, y2 - y1));
      svg.appendChild(line);
    }

    // Nodes
    for (const n of nodes) {
      const cx = xToPx(n.x), cy = yToPx(n.depth);
      state.nodePositions[n.id] = { x: cx, y: cy };

      // All nodes render as circles regardless of collected-state — the
      // collected distinction is already visible through the COLLECTED
      // BY credit in the text column and the owner line on the asset
      // pages, so the tree stays visually uniform.
      const c = document.createElementNS(NS, "circle");
      c.setAttribute("cx", cx);
      c.setAttribute("cy", cy);
      c.setAttribute("r", nodeR);
      c.setAttribute("class", "node");
      c.dataset.id = n.id;
      c.style.setProperty("--depth", n.depth);
      const title = document.createElementNS(NS, "title");
      const ownerAddr = state.collectedLinkOwner.get(n.id);
      const ownerHint = ownerAddr ? ` | collected by ${state.nameByAddr.get(ownerAddr) || ownerAddr.slice(0,6)}` : "";
      title.textContent = `link ${n.id} | by ${n.author.name} | ${n.voteCount}${ownerHint}`;
      c.appendChild(title);
      svg.appendChild(c);

      // Large transparent hit-target for easier clicking (rendered last so
      // pointer events hit it first). Sized generously but capped so
      // neighbouring hits never overlap even when nodes are dense.
      const hit = document.createElementNS(NS, "circle");
      hit.setAttribute("cx", cx); hit.setAttribute("cy", cy);
      hit.setAttribute("r", Math.max(nodeR + 2, Math.min(18, minSpacing * 0.45)));
      hit.setAttribute("class", "node-hit");
      hit.dataset.id = n.id;
      hit.addEventListener("click", (ev) => {
        // Suppress the click that follows a pan drag.
        if (dragJustHappened) { dragJustHappened = false; ev.stopPropagation(); return; }
        selectLink(n.id);
      });
      // Mirror the text-column hover interaction: hovering the tree node
      // lifts the node AND adds .hover to the matching link-block so the
      // reader sees both halves of the mapping light up at once.
      hit.addEventListener("mouseenter", () => {
        state.hoverId = n.id;
        updateTreeSelection();
        const block = document.querySelector(`.link-block[data-id="${CSS.escape(String(n.id))}"]`);
        if (block) block.classList.add("hover");
      });
      hit.addEventListener("mouseleave", () => {
        const id = state.hoverId;
        state.hoverId = null;
        updateTreeSelection();
        if (id != null) {
          const block = document.querySelector(`.link-block[data-id="${CSS.escape(String(id))}"]`);
          if (block) block.classList.remove("hover");
        }
      });
      svg.appendChild(hit);
    }

    // Store the rendered pixel size for framers.
    state.viewPx = { w: W, h: H };
    updateTreeSelection();
  }

  // -----------------------------------------------------------------------
  // Zoom / pan via SVG viewBox
  // -----------------------------------------------------------------------
  // Clamp state.view so at least part of the tree stays visible. The
   // tree's bounding box is derived from every node position; we let
   // the viewBox drift by up to 30% of its own width/height beyond the
   // tree's bounds before refusing to go further. Without this, the
   // reader could pan the entire tree off-screen and stare at a blank
   // panel with no hint of how to get back.
  function treeBounds() {
    const positions = Object.values(state.nodePositions || {});
    if (!positions.length) return null;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const p of positions) {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }
    return { minX, maxX, minY, maxY };
  }
  function clampViewToTree() {
    const b = treeBounds();
    if (!b) return;
    const v = state.view;
    const slackX = v.w * 0.3;
    const slackY = v.h * 0.3;
    const minVx = b.minX - v.w + slackX;   // right edge can go no further left than minX + slack
    const maxVx = b.maxX - slackX;         // left edge can go no further right than maxX - slack
    const minVy = b.minY - v.h + slackY;
    const maxVy = b.maxY - slackY;
    if (v.x < minVx) v.x = minVx;
    if (v.x > maxVx) v.x = maxVx;
    if (v.y < minVy) v.y = minVy;
    if (v.y > maxVy) v.y = maxVy;
  }

  function applyViewBox() {
    const svg = document.getElementById("tree-svg");
    if (!svg) return;
    const v = state.view;
    svg.setAttribute("viewBox", `${v.x} ${v.y} ${v.w} ${v.h}`);
  }

  function frameFullTree() {
    state.frameMode = "full";
    const vp = state.viewPx || { w: 800, h: 600 };
    // A bit of viewBox padding around the tree so it isn't flush with the
    // panel edges (compensates for the tighter SVG margins we use to keep
    // the zoomed-in views from feeling cropped).
    const pad = FULL_TREE_PAD;
    state.view = {
      x: -pad,
      y: -pad,
      w: vp.w + 2 * pad,
      h: vp.h + 2 * pad,
    };
    applyViewBox();
  }

  function frameAncestors(count) {
    if (!state.selectedId) return frameFullTree();
    state.frameMode = "ancestors";
    const path = ancestryOf(state.selectedId);
    const slice = path.slice(-count);
    const positions = slice
      .map(l => state.nodePositions[l.id])
      .filter(Boolean);
    if (positions.length < 1) return frameFullTree();

    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const p of positions) {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }
    // Natural bounds with padding. Small padTop places the oldest node near
    // the top of the visible area (not pinned, but close).
    const padX = 25, padTop = 20, padBottom = 30;
    let w = Math.max(200, (maxX - minX) + 2 * padX);
    let h = Math.max(200, (maxY - minY) + padTop + padBottom);

    // Match the viewBox aspect ratio to the viewport's. This eliminates
    // letterboxing, so the oldest node always appears exactly `padTop` units
    // below the top of the visible area.
    const vp = state.viewPx || { w: 800, h: 600 };
    const vpAspect = vp.w / vp.h;
    if (w / h > vpAspect) {
      h = w / vpAspect;       // grow height to match
    } else {
      w = h * vpAspect;       // grow width to match
    }

    // Center on the ancestry's horizontal midpoint; anchor the top so the
    // oldest node sits padTop below the viewBox top.
    const centerX = (minX + maxX) / 2;
    state.view = {
      x: centerX - w / 2,
      y: minY - padTop,
      w,
      h,
    };
    applyViewBox();
  }

  // -----------------------------------------------------------------------
  // Mouse interactions on the tree: wheel to zoom, drag to pan. Set up once.
  // -----------------------------------------------------------------------
  let dragLast = null;
  let dragMoved = false;
  let dragJustHappened = false;

  function bindTreeInteractions() {
    const svg = document.getElementById("tree-svg");
    if (!svg) return;

    // Wheel → zoom around the cursor.
    svg.addEventListener("wheel", (e) => {
      e.preventDefault();
      const rect = svg.getBoundingClientRect();
      const mx = ((e.clientX - rect.left) / rect.width)  * state.view.w + state.view.x;
      const my = ((e.clientY - rect.top)  / rect.height) * state.view.h + state.view.y;
      const factor = Math.exp(e.deltaY * 0.0015);
      // Clamp zoom. The zoomed-out cap matches the initial full-tree
      // view (including its padding), so manual zoom-out and page-load
      // view are flush. Zoom-in is capped at ~4× closer so the reader
      // can't bury a single node fullscreen with empty space around it.
      const fullW = state.viewPx ? state.viewPx.w : 800;
      const loadW = fullW + 2 * FULL_TREE_PAD;
      const minW = fullW * 0.25;
      const maxW = loadW;
      let newW = state.view.w * factor;
      if (newW < minW) newW = minW;
      if (newW > maxW) newW = maxW;
      const actualFactor = newW / state.view.w;
      state.view.x = mx - (mx - state.view.x) * actualFactor;
      state.view.y = my - (my - state.view.y) * actualFactor;
      state.view.w = state.view.w * actualFactor;
      state.view.h = state.view.h * actualFactor;
      clampViewToTree();
      applyViewBox();
    }, { passive: false });

    // Drag → pan. We track on window so the drag doesn't die when the cursor
    // briefly leaves the SVG area.
    svg.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;
      dragLast = { x: e.clientX, y: e.clientY };
      dragMoved = false;
    });
    window.addEventListener("mousemove", (e) => {
      if (!dragLast) return;
      const dx = e.clientX - dragLast.x;
      const dy = e.clientY - dragLast.y;
      dragLast = { x: e.clientX, y: e.clientY };
      if (!dragMoved && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
        dragMoved = true;
        svg.style.cursor = "grabbing";
      }
      if (dragMoved) {
        const rect = svg.getBoundingClientRect();
        const scale = state.view.w / rect.width;
        state.view.x -= dx * scale;
        state.view.y -= dy * scale;
        clampViewToTree();
        applyViewBox();
      }
    });
    window.addEventListener("mouseup", () => {
      if (dragMoved) {
        dragJustHappened = true;
        svg.style.cursor = "";
      }
      dragLast = null;
      dragMoved = false;
    });
  }

  // Classlist-only update. Two separate visual states:
  //   .selected        — pinned to the clicked link. Never moves on hover.
  //   .hover-highlight — follows the meta-line the reader is hovering in
  //                      the text column. Visually identical to .selected
  //                      (same fill), but only applies to a node *other*
  //                      than the selected one — so hovering the selected
  //                      node is a no-op and the two classes never compete
  //                      on the same element.
  // The thicker stroke runs along the branch from genesis to selectedId;
  // hover never changes the path.
  function updateTreeSelection() {
    const svg = document.getElementById("tree-svg");
    if (!svg) return;
    const ancestryIds = new Set(
      ancestryOf(state.selectedId).map(l => l.id)
    );
    const selectedId = state.selectedId;
    const hoverId = state.hoverId && state.hoverId !== selectedId ? state.hoverId : null;
    const readoutId = hoverId || selectedId;
    const r = state.nodeR || 4;
    // Three-tier sizing so the visual hierarchy reads at a glance:
    //   base            — r       (nodes off the current branch)
    //   in-path         — r × 1.5 (the ancestry from genesis to selected)
    //   selected / hover — r × 2   (the node you clicked or are pointing at)
    // Selected and hover share the larger size so a hover preview visibly
    // matches what clicking would produce.
    svg.querySelectorAll(".node").forEach(el => {
      const id = el.dataset.id;
      const inPath = ancestryIds.has(id);
      const isSelected = id === selectedId;
      const isHover = id === hoverId;
      el.classList.toggle("in-path", inPath);
      el.classList.toggle("selected", isSelected);
      el.classList.toggle("hover-highlight", isHover);
      let size = r;
      if (isSelected || isHover) size = r * 2;
      else if (inPath)           size = r * 1.5;
      el.setAttribute("r", size);
    });
    svg.querySelectorAll("circle.recap-ring").forEach(el => {
      el.classList.toggle("in-path", ancestryIds.has(el.dataset.id));
    });
    svg.querySelectorAll("line.edge").forEach(el => {
      el.classList.toggle("in-path", ancestryIds.has(el.dataset.child));
    });
    updateTreeNodeInfo(readoutId);
    updatePathStats();
  }

  // Readout on the left of the text panel's control row: how many links
  // the current path contains and how many distinct authors wrote them.
  function updatePathStats() {
    const el = document.getElementById("text-path-stats");
    if (!el) return;
    if (!state.selectedId) { el.textContent = ""; return; }
    const path = ancestryOf(state.selectedId);
    const authors = new Set(path.map(l => l.author.id));
    const linkWord   = path.length  === 1 ? "LINK"   : "LINKS";
    const authorWord = authors.size === 1 ? "AUTHOR" : "AUTHORS";
    el.textContent = `${path.length} ${linkWord} | ${authors.size} ${authorWord}`;
  }

  // The center readout on the tree panel's top row: the current link id,
  // rendered as a clickable/editable chip. Click it to type any id and
  // jump (replaces the old topbar search input).
  function updateTreeNodeInfo(id) {
    const bar = document.getElementById("tree-node-info");
    if (!bar) return;
    const link = state.byId[id];
    if (!link) { bar.textContent = ""; return; }
    bar.innerHTML = `<span class="id-jump" title="click to jump to another link">#${link.id}</span>`;
  }

  // Click-to-type jump. Swap the static label for an input, focus it, and
  // navigate on Enter. Escape or blur cancels and restores the label.
  function bindTreeNodeJump() {
    const bar = document.getElementById("tree-node-info");
    if (!bar) return;
    bar.addEventListener("click", (e) => {
      const chip = e.target.closest(".id-jump");
      if (!chip) return;
      if (chip.tagName === "INPUT") return;
      const current = state.selectedId || "";
      const input = document.createElement("input");
      input.type = "text";
      input.className = "id-jump-input id-jump";
      input.value = "";
      input.placeholder = "#" + current;
      input.spellcheck = false;
      input.autocomplete = "off";
      bar.innerHTML = "";
      bar.appendChild(input);
      input.focus();

      const restore = () => updateTreeNodeInfo(state.selectedId);
      const onBlur = () => restore();
      input.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") {
          ev.preventDefault();
          const raw = input.value.trim().replace(/^#/, "");
          if (/^\d+$/.test(raw) && state.byId[raw]) {
            // selectLink → updateTreeSelection → updateTreeNodeInfo, which
            // replaces this input in the DOM. The replacement would fire a
            // blur event on the (now-detached) input and re-enter our
            // handler mid-selectLink, interrupting renderText. Drop the
            // blur listener before the cascade runs so selectLink finishes
            // cleanly; the chip is already repainted by updateTreeNodeInfo.
            input.removeEventListener("blur", onBlur);
            selectLink(raw);
            return;
          }
          restore();
        } else if (ev.key === "Escape") {
          ev.preventDefault();
          restore();
        }
      });
      input.addEventListener("blur", onBlur);
    });
  }

  // Return the curated featured tip if it exists, otherwise fall back
  // to the longest branch. Used by the initial page load and the
  // SPRAWL menu button so first-time visitors land on a chosen
  // storyline rather than whatever happens to be deepest.
  function findFeaturedTip() {
    return state.byId[FEATURED_TIP_ID] || findLongestBranchTip();
  }

  // Find the tip whose ancestry back to genesis is longest. Ties broken by
  // highest id. Used by the RESET button to show the deepest coherent
  // storyline.
  function findLongestBranchTip() {
    if (!state.links.length) return null;
    const hasChild = new Set();
    for (const l of state.links) {
      if (l.parent) hasChild.add(l.parent.id);
    }
    const tips = state.links.filter(l => !hasChild.has(l.id));
    if (!tips.length) return state.links[state.links.length - 1];
    let best = tips[0];
    let bestDepth = -1;
    for (const tip of tips) {
      const depth = ancestryOf(tip.id).length;
      if (depth > bestDepth || (depth === bestDepth && Number(tip.id) > Number(best.id))) {
        bestDepth = depth;
        best = tip;
      }
    }
    return best;
  }

  // --- Ancestry + entity extraction ---
  function ancestryOf(id) {
    const path = [];
    let cur = state.byId[id];
    while (cur) {
      path.push(cur);
      cur = cur.parent ? state.byId[cur.parent.id] : null;
    }
    return path.reverse();
  }

  // Expose to sprawl-tts.js so the narration session controller can read
  // the current selection and walk the ancestry without reaching into the
  // IIFE's private state.
  window.state       = state;
  window.ancestryOf  = ancestryOf;

  const ENTITY_RE = /\[([a-z0-9-]+)\]/g;
  const ARC_RE    = /\{([a-z0-9-]+)\}/g;

  function entityIdsInText(text) {
    const out = new Set();
    let m;
    while ((m = ENTITY_RE.exec(text)) !== null) out.add(m[1]);
    return [...out];
  }

  function entityIdsInBranch(id) {
    const path = ancestryOf(id);
    const corpus = path.map(l => l.cleared ? "" : l.text).join("\n");
    return entityIdsInText(corpus);
  }

  // --- Rendering: text + entities ---
  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, ch => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]
    ));
  }

  // Resolve an entity tag tolerantly: try exact id, then with "the-" prefix
  // stripped (so `[the-bell]` finds `bell`), then with "the-" added (so
  // `[bell]` finds `the-bell`). Early seed entries got this wrong; this keeps
  // the reader from seeing raw brackets when the author's intent is clear.
  function resolveEntity(id) {
    if (state.entitiesById[id]) return state.entitiesById[id];
    if (id.startsWith("the-")) {
      const alt = state.entitiesById[id.slice(4)];
      if (alt) return alt;
    } else {
      const alt = state.entitiesById["the-" + id];
      if (alt) return alt;
    }
    return null;
  }

  // Does this offset fall at the start of a sentence? Used to decide whether
  // to keep "The" capitalized on a display name that begins with an article.
  function isSentenceStart(text, offset) {
    let i = offset - 1;
    while (i >= 0 && /[ \t]/.test(text[i])) i--;
    if (i < 0) return true;
    return /[.!?\n]/.test(text[i]);
  }

  function renderLinkText(rawText) {
    if (!rawText) return "";
    let t = escapeHtml(rawText);

    // Arc tags: strip entirely (sentence-level coordination, not narration).
    t = t.replace(/\{[a-z0-9-]+\}\s*/g, "");

    // Entity tags work in two modes. Both keep the brackets visible so
    // readers can see something is tagged.
    //
    // Attached mode: a word immediately followed by `[id]` means "this
    // word refers to <id>". We keep the word, wrap it in literal
    // brackets, and let the id ride along as data-entity for the
    // tooltip / click handler. Example: `He[adam]` → `[He]`.
    t = t.replace(/(\w+)\[([a-z0-9-]+)\]/g, (m, word, id) => {
      return `<span class="entity" data-entity="${id}">[${word}]</span>`;
    });

    // Standalone mode: a bare `[id]` is rendered as `[id]` verbatim —
    // the id IS the visible token. No display-name substitution, since
    // that produces awkward auto-capitalization for processes/objects
    // (e.g. `[the-trace]` → `[Trace]`). The display name still surfaces
    // on hover via the tooltip and on the entities page. Example:
    // `I watch [the-trace]` → `I watch [the-trace]`.
    t = t.replace(/\[([a-z0-9-]+)\]/g, (m, id) => {
      return `<span class="entity" data-entity="${id}">[${id}]</span>`;
    });

    return t;
  }

  // Pulls the full ancestry's text in one /links/{id}/context call and
  // mutates state.byId[...].text so the subsequent render has real prose.
  // Safe to call repeatedly — bails out when every ancestor in the chain
  // already has text cached. The initial tree payload intentionally ships
  // without text to keep first paint light.
  async function ensureAncestryTextCached(id) {
    const chain = ancestryOf(id);
    if (chain.every(l => (l.text && l.text.length))) return;
    try {
      const resp = await SprawlAPI.linkContext(id);
      const ancestors = (resp && resp.ancestors) || [];
      for (const a of ancestors) {
        const row = state.byId[String(a.linkId)];
        if (row) row.text = a.text || "";
      }
    } catch (e) {
      // Transient / rate-limited — render proceeds with whatever text
      // we already have, blanks for the missing ones.
    }
  }

  async function renderText() {
    const id = state.selectedId;
    const target = document.getElementById("text-content");
    // Drop any min-height left over from a previous prefix-truncation click.
    target.style.minHeight = "";
    if (!id) { target.innerHTML = '<div class="empty">no link selected</div>'; return; }

    // Fetch (and cache) text for the whole ancestry if we don't have it yet.
    await ensureAncestryTextCached(id);
    // Race guard: if the user picked a different link while we were
    // awaiting the text fetch, let that newer render handle the DOM.
    if (state.selectedId !== id) return;

    // Render the entire ancestry from genesis to the selected link — like
    // opening a book at a page, with all prior pages available above.
    const path = ancestryOf(id);
    target.innerHTML = path.map((link, i) => {
      // Author name links to their profile. onclick stop-prop so clicking the
      // name doesn't also re-select the current link via the meta-line handler.
      const authorHref = "author.html?addr=" + encodeURIComponent(link.author.id);
      const authorHtml = `<a href="${authorHref}" onclick="event.stopPropagation()">${escapeHtml((link.author.name || link.author.id.slice(0,6)).toUpperCase())}</a>`;
      // Owner credit, only shown when the link has actually been collected.
      const ownerAddr = state.collectedLinkOwner.get(link.id);
      let collectedHtml = "";
      if (ownerAddr) {
        const ownerName = state.nameByAddr.get(ownerAddr);
        const ownerLabel = ownerName ? ownerName.toUpperCase() : ownerAddr.slice(0, 6) + "…" + ownerAddr.slice(-4);
        const ownerHref  = "author.html?addr=" + encodeURIComponent(ownerAddr);
        collectedHtml = ` | COLLECTED BY <a href="${ownerHref}" onclick="event.stopPropagation()">${escapeHtml(ownerLabel)}</a>`;
      }
      // VOTE affordance. Shown when the viewer has a connected wallet on
      // Mainnet, is registered (implicitly checked via SprawlAPI's reply
      // in refreshVoterState), hasn't already voted on this link, and
      // the link isn't cleared. Free to cast — pure signature, no tx.
      const canVote = sprawlWallet.isConnected()
        && sprawlWallet.isOnMainnet()
        && state.voterRegistered
        && !state.votedLinkIds.has(String(link.id))
        && !link.cleared;
      const voteActionHtml = canVote
        ? ` | <a class="act-vote" href="#" data-link-id="${escapeHtml(link.id)}">VOTE</a>`
        : "";
      // COLLECT affordance at the end of the meta line. Same gating as
      // VOTE: connected wallet, on Mainnet, registered as an author.
      // On top of that, the link must not already be on-chain, not
      // cleared, and not the genesis (#0) which can't be collected.
      const canCollect = sprawlWallet.isConnected()
        && sprawlWallet.isOnMainnet()
        && state.voterRegistered
        && !ownerAddr
        && !link.cleared
        && link.id !== "0";
      const collectActionHtml = canCollect
        ? ` | <a class="act-collect" href="#" data-link-id="${escapeHtml(link.id)}">COLLECT</a>`
        : "";
      // PLAY affordance. Omitted on cleared links (nothing to narrate).
      // Genesis (link 0) IS narratable — unlike COLLECT, which is gated
      // by the contract's self-collection rule, PLAY just reads text.
      const playActionHtml = !link.cleared
        ? ` | <a class="act-play" href="#" data-link-id="${escapeHtml(link.id)}">LISTEN</a>`
        : "";
      // #id is wrapped so CSS can give it a hover underline — signals
      // that clicking the cell navigates to this link (same as clicking
      // the tree node).
      const idHtml = `<span class="meta-id">#${escapeHtml(link.id)}</span>`;
      const meta = `${idHtml} | ${authorHtml} | +${link.voteCount}${playActionHtml}${voteActionHtml}${collectedHtml}${collectActionHtml}`;
      const body = link.cleared ? '<span class="empty">[cleared]</span>' : renderLinkText(link.text);
      const selected = link.id === id ? " selected" : "";
      // --block-index feeds the boot-stagger (see body.boot rules in CSS).
      // Ignored on re-renders after boot ends, since those rules no longer
      // match — the block just inherits its default (fully visible) state.
      return `<div class="link-block${selected}" data-id="${link.id}" style="--block-index: ${i};">
        <div class="meta">${meta}</div>
        <div class="text-body">${body}</div>
      </div>`;
    }).join("");

    // Scroll the selected (latest in the path) into view. On desktop this
    // scrolls the text panel's internal .panel-scroll container. On mobile
    // the panel isn't a scroll container (overflow:visible for document-
    // level scrolling), so scrollIntoView walks up to the document and
    // hijacks the user's position — jumping them to the bottom of the
    // ancestry on initial load. Skip it below the desktop breakpoint.
    const selected = target.querySelector(".link-block.selected");
    const isDesktop = !window.matchMedia("(max-width: 720px)").matches;
    if (selected && isDesktop) selected.scrollIntoView({ block: "start", behavior: "instant" });

    // Wire the COLLECT and VOTE anchors in the meta lines. stopPropagation
    // on both keeps the click from also firing the meta's "re-select this
    // link" path.
    target.querySelectorAll(".act-collect").forEach(el => {
      el.addEventListener("click", (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const linkId = el.dataset.linkId;
        const link = state.byId[linkId];
        if (!link) return;
        sprawlActions.collect("link", linkId, {
          authorName: link.author.name || link.author.id,
        });
      });
    });
    target.querySelectorAll(".act-vote").forEach(el => {
      el.addEventListener("click", (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        sprawlActions.vote(el.dataset.linkId);
      });
    });
    target.querySelectorAll(".act-play").forEach(el => {
      el.addEventListener("click", (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        if (window.SprawlTTS) window.SprawlTTS.onLinkButtonClick(el.dataset.linkId);
      });
    });

    bindTextHover();
  }

  // Entities are no longer listed in a side panel — they're revealed via a
  // hover tooltip on the underlined references in the text. The plain-text
  // helper below renders an entity description with tags stripped / display
  // names substituted, so the tooltip doesn't show brackets or create nested
  // hoverable elements.
  function entityDescriptionPlain(text) {
    if (!text) return "";
    let t = text;
    t = t.replace(/\{[a-z0-9-]+\}\s*/g, "");
    t = t.replace(/(\w+)\[[a-z0-9-]+\]/g, (m, word) => word);
    t = t.replace(/\[([a-z0-9-]+)\]/g, (m, id) => {
      const e = resolveEntity(id);
      return e ? e.name : m;
    });
    return t;
  }

  // --- Interaction ---
  // opts:
  //   updateHash     — write the new selection to the URL hash (default true)
  //   preserveScroll — the clicked link is already rendered as an ancestor
  //                    in the text column; instead of rebuilding innerHTML,
  //                    remove the link-blocks below it and flip .selected.
  //                    Everything above the clicked block stays in place at
  //                    the pixel, so no scroll math is needed.
  function selectLink(id, opts) {
    opts = opts || {};
    const newId = String(id);

    // Narration is tied to the visible ancestry. If the reader jumps to
    // a different branch, an in-progress session is no longer meaningful
    // (its queue points at link-blocks about to be replaced).
    if (window.SprawlTTS && String(state.selectedId) !== newId) {
      window.SprawlTTS.stopSession();
    }

    // Prefix-truncate path: when the click came from a meta line in the text
    // column, the clicked link is guaranteed to be an ancestor of the current
    // selection, i.e. already rendered in the DOM. Rather than rebuilding the
    // whole text column (which reflows everything and makes scroll math
    // fragile), just delete the link-blocks that come after it and flip the
    // .selected class. The DOM above the clicked block doesn't move a pixel.
    const textContent = document.getElementById("text-content");
    const scroller = document.querySelector("#text-panel .panel-scroll");
    const targetBlock = textContent && textContent.querySelector(`.link-block[data-id="${CSS.escape(newId)}"]`);
    if (opts.preserveScroll && targetBlock && scroller) {
      // Before removing content below the clicked block, hold the scroll
      // container's height at (scrollTop + clientHeight) so that removing
      // nodes can't make scrollHeight smaller than the current scrollTop +
      // viewport — which would cause the browser to clamp scrollTop and
      // shift every block above into a different on-screen position.
      const keepHeight = scroller.scrollTop + scroller.clientHeight;
      textContent.style.minHeight = keepHeight + "px";

      let sib = targetBlock.nextElementSibling;
      while (sib) {
        const next = sib.nextElementSibling;
        sib.remove();
        sib = next;
      }
      const prevSel = textContent.querySelector(".link-block.selected");
      if (prevSel && prevSel !== targetBlock) prevSel.classList.remove("selected");
      targetBlock.classList.add("selected");

      state.selectedId = newId;
      state.hoverId = null;
      updateTreeSelection();
      if (!document.body.classList.contains("tree-expanded")) {
        frameAncestors(AUTO_FRAME_COUNT);
      }

      if (opts.updateHash !== false) {
        const t = "#link-" + state.selectedId;
        if (location.hash !== t) history.replaceState(null, "", t);
      }
      return;
    }

    state.selectedId = newId;
    state.hoverId = null;
    updateTreeSelection();
    if (!document.body.classList.contains("tree-expanded")) {
      frameAncestors(AUTO_FRAME_COUNT);
    }
    renderText({});

    if (opts.updateHash !== false) {
      const target = "#link-" + state.selectedId;
      if (location.hash !== target) history.replaceState(null, "", target);
    }
  }

  // Deep-link parser. Accepts "#link-N" where N is a digit string.
  function parseLinkHash() {
    const m = /^#link-(\d+)$/.exec(location.hash || "");
    return m ? m[1] : null;
  }

  // --- Keyboard shortcuts ---
  // Arrow keys: Up = parent, Down = first child, Left/Right = sibling.
  // Skip when the user is typing in an input/textarea.
  function bindKeyboardShortcuts() {
    document.addEventListener("keydown", (e) => {
      const t = e.target;
      if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA")) return;
      if (!["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) return;

      const cur = state.byId[state.selectedId];
      if (!cur) return;

      let nextId = null;

      if (e.key === "ArrowUp") {
        if (cur.parent) nextId = cur.parent.id;
      } else if (e.key === "ArrowDown") {
        const kids = state.childrenByParent[cur.id] || [];
        if (kids.length) nextId = kids[0].id;
      } else if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
        const pid = cur.parent ? cur.parent.id : "__root__";
        const sibs = state.childrenByParent[pid] || [];
        const idx = sibs.findIndex(s => s.id === cur.id);
        if (idx !== -1) {
          const delta = e.key === "ArrowLeft" ? -1 : 1;
          const nb = sibs[idx + delta];
          if (nb) nextId = nb.id;
        }
      }

      if (nextId !== null) {
        e.preventDefault();
        selectLink(nextId);
      }
    });
  }

  // After text render, wire hover + click on each meta line. Hover lights up
  // the corresponding tree node; clicking is equivalent to clicking that
  // node in the tree — it becomes the tip of the displayed ancestry.
  function bindTextHover() {
    const scroller = document.querySelector("#text-panel .panel-scroll");
    if (!scroller) return;
    // Hovering and clicking both target the whole cell — meta line or
    // body text. Anchors inside the cell (.act-play, .act-vote,
    // .act-collect) already call ev.stopPropagation() in their own
    // handlers so their interactions don't also trigger selectLink.
    scroller.querySelectorAll(".link-block").forEach(block => {
      const id = block.dataset.id;
      block.addEventListener("mouseenter", () => {
        state.hoverId = id;
        updateTreeSelection();
      });
      block.addEventListener("mouseleave", () => {
        state.hoverId = null;
        updateTreeSelection();
      });
      // In-text clicks are always a prefix truncation of the current
      // path — preserve scroll so the clicked block stays in place and
      // the content below it drops away.
      block.addEventListener("click", () => selectLink(id, { preserveScroll: true }));
    });
  }

  // Single entity-tooltip bound once at boot. Uses event delegation on the
  // scroll container so newly-rendered passages don't need re-binding.
  function bindEntityTooltip() {
    const tooltip = document.getElementById("entity-tooltip");
    const scroller = document.querySelector("#text-panel .panel-scroll");
    if (!tooltip || !scroller) return;

    scroller.addEventListener("mouseover", (e) => {
      // Clean reading mode suppresses the tooltip along with the underlines
      // and meta lines.
      if (document.body.classList.contains("hide-meta")) return;
      const span = e.target.closest(".entity[data-entity]");
      if (!span || !scroller.contains(span)) return;
      const ent = resolveEntity(span.dataset.entity);
      if (!ent) return;
      tooltip.innerHTML = `
        <div class="tip-head">${escapeHtml(ent.name)}<span class="tip-type">(${escapeHtml(ent.entityType)})</span></div>
        <div class="tip-desc">${escapeHtml(entityDescriptionPlain(ent.description || ""))}</div>
      `;
      // Position below the span, aligned to its left. Clamp horizontally so
      // it never runs off the viewport.
      const rect = span.getBoundingClientRect();
      tooltip.classList.add("visible");
      const tipRect = tooltip.getBoundingClientRect();
      let left = rect.left;
      if (left + tipRect.width > window.innerWidth - 8) {
        left = Math.max(8, window.innerWidth - tipRect.width - 8);
      }
      tooltip.style.left = left + "px";
      tooltip.style.top = (rect.bottom + 6) + "px";
    });

    scroller.addEventListener("mouseout", (e) => {
      const span = e.target.closest(".entity[data-entity]");
      if (!span) return;
      tooltip.classList.remove("visible");
    });

    // Hide on scroll so the tooltip doesn't linger detached from its span.
    scroller.addEventListener("scroll", () => tooltip.classList.remove("visible"));
  }

  // --- Panel controls (info toggle, expand toggle) ---
  function bindPanelControls() {
    const metaBtn = document.getElementById("toggle-meta");
    const expandBtn = document.getElementById("toggle-expand");
    if (metaBtn) {
      metaBtn.addEventListener("click", () => {
        // Info is visible by default, so the button offers the action the
        // user can take next: HIDE INFO when shown, REVEAL INFO when hidden.
        const nowHidden = document.body.classList.toggle("hide-meta");
        metaBtn.textContent = nowHidden ? "REVEAL INFO" : "HIDE INFO";
      });
    }
    if (expandBtn) {
      expandBtn.addEventListener("click", () => {
        document.body.classList.remove("tree-expanded");
        const nowExpanded = document.body.classList.toggle("expanded");
        expandBtn.textContent = nowExpanded ? "COLLAPSE" : "EXPAND";
        // Tree has new dimensions on return; re-layout next frame.
        requestAnimationFrame(renderTree);
      });
    }

    // RESET button: longest-branch tip, full-tree view, clean URL.
    // Always the deepest coherent storyline, regardless of which
    // branch is currently featured.
    function resetToHome() {
      selectLink(findLongestBranchTip().id, { updateHash: false });
      frameFullTree();
      history.replaceState(null, "", location.pathname + location.search);
    }

    // SPRAWL title click: the curated featured branch, full-tree view,
    // clean URL. Same destination as a fresh page load.
    function featureToHome() {
      selectLink(findFeaturedTip().id, { updateHash: false });
      frameFullTree();
      history.replaceState(null, "", location.pathname + location.search);
    }

    const resetBtn = document.getElementById("reset-view");
    if (resetBtn) resetBtn.addEventListener("click", resetToHome);

    const titleHome = document.getElementById("title-home");
    if (titleHome) {
      titleHome.addEventListener("click", (e) => {
        // On the main page itself we don't want to reload — just go
        // back to the featured branch. From any other page, the
        // href="index.html" does its normal navigation, and the
        // initial-load path will land on the featured branch too.
        e.preventDefault();
        featureToHome();
      });
    }

    const randomBtn = document.getElementById("random-link");
    if (randomBtn) {
      randomBtn.addEventListener("click", () => {
        if (!state.links.length) return;
        const pick = state.links[Math.floor(Math.random() * state.links.length)];
        selectLink(pick.id);
      });
    }

    const treeExpandBtn = document.getElementById("toggle-tree-expand");
    if (treeExpandBtn) {
      treeExpandBtn.addEventListener("click", () => {
        document.body.classList.remove("expanded");
        const nowExpanded = document.body.classList.toggle("tree-expanded");
        treeExpandBtn.textContent = nowExpanded ? "COLLAPSE" : "EXPAND";
        // Also reset the other expand button — leaving this mode implies the
        // other column wasn't expanded either.
        if (expandBtn) expandBtn.textContent = "EXPAND";
        // Entering fullscreen tree: show the whole tree, same as page load.
        // Leaving: return to the zoomed-in ancestry view.
        requestAnimationFrame(() => {
          renderTree();
          if (nowExpanded) frameFullTree();
          else if (state.selectedId) frameAncestors(AUTO_FRAME_COUNT);
        });
      });
    }
  }


  // --- Mobile meta-line elastic snap-back ---
  // On mobile the .meta line stays on one row and scrolls horizontally
  // when the content (PLAY, VOTE, COLLECTED BY, …) exceeds the viewport
  // width. Once the reader stops interacting, we animate it back to
  // scrollLeft: 0 so the line returns to its natural "id | author |
  // votes" opening. Captures the scroll event (which does not bubble)
  // on the document so the listener works for any .meta element regardless
  // of when renderText() created it. Storage is WeakMap so removed meta
  // lines release their pending timer reference to GC.
  (function setupMetaElastic() {
    const IDLE_MS = 1000;
    const timers = new WeakMap();

    document.addEventListener("scroll", (e) => {
      const meta = e.target;
      if (!(meta instanceof Element)) return;
      if (!meta.classList || !meta.classList.contains("meta")) return;
      const parent = meta.parentElement;
      if (!parent || !parent.classList.contains("link-block")) return;

      // Already at the start — nothing to schedule.
      if (meta.scrollLeft === 0) {
        const t = timers.get(meta);
        if (t) { clearTimeout(t); timers.delete(meta); }
        return;
      }
      const existing = timers.get(meta);
      if (existing) clearTimeout(existing);
      const id = setTimeout(() => {
        meta.scrollTo({ left: 0, behavior: "smooth" });
        timers.delete(meta);
      }, IDLE_MS);
      timers.set(meta, id);
    }, { capture: true, passive: true });
  })();

  // Hamburger toggle + theme toggle now live in sprawl-topbar.js.

  // --- Boot ---
  (async () => {
    bindPanelControls();
    bindTreeInteractions();
    bindEntityTooltip();
    bindTreeNodeJump();
    bindKeyboardShortcuts();
    window.addEventListener("hashchange", () => {
      const id = parseLinkHash();
      if (id && state.byId[id]) selectLink(id);
    });
    try {
      await loadAll();
    } catch (e) {
      document.getElementById("text-content").innerHTML =
        `<div class="empty">could not load: ${escapeHtml(e.message)}</div>`;
      return;
    }
    // Update stats in the top bar. "AUTHORS" = total registered citizens
    // (matches the AUTHORS page) — including citizens who registered but
    // haven't written yet. "LINKS" = total visible links in the tree.
    const linkCount = state.links.length;
    document.getElementById("stat-writers").textContent = state.citizenCount || 0;
    document.getElementById("stat-links").textContent = linkCount;

    renderTree();
    // If the URL carries a valid deep-link, honor it and auto-zoom to the
    // ancestry. Otherwise open at the curated featured branch tip,
    // zoomed all the way out so the reader sees the whole tree first.
    // Either way, we do NOT write to the URL hash on boot — a clean URL
    // stays clean on reload.
    const hashed = parseLinkHash();
    if (hashed && state.byId[hashed]) {
      selectLink(hashed, { updateHash: false });
    } else {
      selectLink(findFeaturedTip().id, { updateHash: false });
      frameFullTree();
    }
    window.addEventListener("resize", () => {
      renderTree();
      if (document.body.classList.contains("tree-expanded")) {
        frameFullTree();
      } else if (state.frameMode === "ancestors" && state.selectedId) {
        // Only reframe to the 15-ancestor zoom if the user was already in
        // that mode. Initial load leaves state.frameMode === "full", so
        // iOS's URL-bar-hide resize event no longer snaps the tree into
        // a zoomed view when the reader starts scrolling.
        frameAncestors(AUTO_FRAME_COUNT);
      } else {
        frameFullTree();
      }
    });

    // Optimistic UI on successful link collect. sprawl-actions dispatches
    // sprawl:collected after tx confirmation; we update the local map and
    // re-render so the reader sees the "COLLECTED BY …" stamp and the
    // tree node flips from circle to rect right away, without waiting on
    // the subgraph. renderTree() preserves the current viewBox, so the
    // user's zoom/pan stays exactly where it was.
    window.addEventListener("sprawl:collected", (e) => {
      const detail = (e && e.detail) || {};
      if (detail.kind !== "link") return;
      const { nativeId, owner } = detail;
      if (!nativeId || !owner) return;
      state.collectedLinkOwner.set(String(nativeId), owner.toLowerCase());
      renderText();
      renderTree();
    });

    // Voter state — fetched when the wallet connects, refetched when the
    // account changes, cleared when the wallet disconnects. Drives the
    // VOTE affordance per link in renderText. We track lastVoterAddr so
    // unrelated wallet events (chain switch, same account reselect) don't
    // thrash the API with a refetch.
    async function refreshVoterState() {
      const addr = sprawlWallet.getAddress();
      if (!addr) {
        state.votedLinkIds = new Set();
        state.voterRegistered = false;
        state.lastVoterAddr = null;
        return;
      }
      // Two parallel fetches: the citizen record tells us whether the
      // wallet is registered (VOTE gate), the vote list tells us which
      // links are already voted on (also a gate). Both fail-soft.
      try {
        const [citizen, votes] = await Promise.all([
          SprawlAPI.citizen ? SprawlAPI.citizen(addr) : fetch(`${(window.SPRAWL_API_URL || "https://d1pdbr4fdk59bz.cloudfront.net").replace(/\/$/, "")}/citizens/${addr.toLowerCase()}`).then(r => r.ok ? r.json() : null),
          SprawlAPI.votesByVoter(addr, 1000),
        ]);
        state.voterRegistered = !!(citizen && citizen.isRegistered !== false);
        const items = (votes && votes.items) || [];
        state.votedLinkIds = new Set(items.map(v => String(v.linkId)));
        state.lastVoterAddr = addr;
      } catch {
        state.votedLinkIds = new Set();
        state.voterRegistered = false;
      }
    }
    sprawlWallet.on(async (ws) => {
      const now = ws.address || null;
      if (now !== state.lastVoterAddr) {
        await refreshVoterState();
        renderText();
      } else {
        // Address unchanged but some other field moved (e.g., chainId).
        // The VOTE gate depends on isOnMainnet too, so re-render.
        renderText();
      }
    });
    // Initial fetch in case the wallet was already authorized before
    // page load (sprawl-wallet's silent init populates state quickly).
    refreshVoterState().then(() => { if (state.selectedId) renderText(); });

    // Optimistic UI on successful vote: add to the local set, bump the
    // link's cached voteCount, and re-render the text column.
    window.addEventListener("sprawl:voted", (e) => {
      const { linkId } = (e && e.detail) || {};
      if (!linkId) return;
      state.votedLinkIds.add(String(linkId));
      const link = state.byId[String(linkId)];
      if (link) link.voteCount = (Number(link.voteCount) || 0) + 1;
      renderText();
    });

    // body.boot gates the staggered reveal animations (topbar rule,
    // panel divider, tree nodes + edges, text blocks) AND the hover /
    // selected inversion on the text cells and tree nodes. Must be long
    // enough to cover the worst-case ancestry length so the tail of the
    // text column doesn't cut off mid-wipe.
    setTimeout(() => document.body.classList.remove("boot"), 3500);
  })();
})();
</script>
</body>
</html>
