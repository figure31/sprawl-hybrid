<style>
  @font-face {
    font-family: 'Sprawl Mono';
    src: url('fonts/GT-Canon-Mono-Regular.woff2') format('woff2');
    font-weight: normal; font-style: normal; font-display: swap;
  }
  :root {
    --fg: #000; --bg: #fff; --mute: #888;
    --rule: 1px; --pad: 12px; --topbar-h: 44px;
    --font-size: 13px; --line-height: 1.5;
  }
  html.dark { --fg: #fff; --bg: #000; }
  * { box-sizing: border-box; font-size: inherit; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: 'Sprawl Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: var(--font-size); line-height: var(--line-height);
    min-height: 100%;
  }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    padding: 0 var(--pad);
    border-bottom: var(--rule) solid var(--fg); background: var(--bg);
    z-index: 20;
  }
  .topbar > .title,
  .topbar > .title-group  { justify-self: start; }
  .topbar > .nav-middle   { justify-self: center; }
  .topbar > .nav-right    { justify-self: end; }
  /* FEED and MARKETPLACE float at 25% and 75% of the viewport — each
     sits midway between the left/right edge and the centered middle nav,
     so the bar stays symmetric. Absolute-positioned so they don't
     participate in the grid and shift the other columns. */
  .topbar > .nav-feed,
  .topbar > .nav-marketplace {
    position: absolute;
    top: 0; bottom: 0;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
  }
  .topbar > .nav-feed        { left: 25%; }
  .topbar > .nav-marketplace { left: 75%; }
  .topbar .title { letter-spacing: 0.08em; }
  .topbar nav { display: flex; gap: 18px; }
  .topbar nav a.active { text-decoration: underline; }

  main {
    max-width: 820px; margin: 0 auto;
    padding: calc(var(--topbar-h) + 24px) var(--pad) 48px;
  }
  h2 {
    margin: 0 0 4px 0;
    font-size: var(--font-size); font-weight: normal;
    letter-spacing: 0.08em;
  }
  h3 {
    margin: 32px 0 12px 0;
    font-size: var(--font-size); font-weight: normal;
    letter-spacing: 0.08em;
  }
  .addr { margin-bottom: 28px; letter-spacing: 0.04em; }
  .addr .line { }
  .banned-tag { color: var(--fg); }

  .counts { margin-bottom: 20px; }
  .counts .row { display: flex; gap: 8px; }
  .counts .k   { letter-spacing: 0.04em; }

  .link-row { margin-bottom: 14px; }
  .link-row .head { color: var(--mute); letter-spacing: 0.04em; }
  .link-row .body { margin-top: 2px; overflow-wrap: anywhere; }

  .entity-row, .arc-row { margin-bottom: 14px; }
  .entity-row .head, .arc-row .head { letter-spacing: 0.04em; }
  .entity-row .desc, .arc-row .desc { margin-top: 2px; color: var(--fg); }
  .entity-row .sub,  .arc-row .sub  { margin-top: 2px; color: var(--mute); letter-spacing: 0.04em; }

  .votes-line { color: var(--fg); overflow-wrap: anywhere; }

  /* --- Own-profile affordances (wallet-gated) ------------------------
     When the visitor's connected wallet matches the URL's addr, the body
     gains `.own-profile`. That reveals LIST/UNLIST buttons in the
     COLLECTED ITEMS section and a WITHDRAW row at the top of the page.
     Buttons use the existing .ctl vocabulary (muted → fg on hover). */
  .own-only { display: none; }
  body.own-profile .own-only { display: inline; }

  /* Guidance note shown above the sections on an own profile when the
     viewer is either not registered as an author yet, or registered but
     hasn't authored anything. Block-level (unlike the inline .own-only
     affordances above) so it reads as its own paragraph. */
  .profile-note {
    display: none;
    color: var(--mute);
    margin: 0 0 24px 0;
    letter-spacing: 0.04em;
  }
  body.own-profile .profile-note { display: block; }

  /* Fallback "(no contributions yet)" line — useful for visitors looking
     at someone else's empty profile, but noisy on an own empty profile
     where the profile-note above is already covering it. */
  body.own-profile .profile-empty { display: none; }

  .row-actions { margin-top: 2px; color: var(--mute); letter-spacing: 0.04em; }
  .row-actions .ctl { cursor: pointer; user-select: none; color: var(--mute); }
  .row-actions .ctl:hover { color: var(--fg); text-decoration: underline; }
  .row-actions .price { color: var(--fg); }

  .withdraw-row { margin-bottom: 20px; letter-spacing: 0.04em; }
  .withdraw-row .k { color: var(--mute); margin-right: 8px; }
  .withdraw-row .v { color: var(--fg); }
  .withdraw-row .ctl { cursor: pointer; user-select: none; color: var(--mute); margin-left: 12px; }
  .withdraw-row .ctl:hover { color: var(--fg); text-decoration: underline; }
</style>

<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const addr = (params.get("addr") || "").toLowerCase();

  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, c => (
      {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
    ));
  }
  function shortAddr(a) { return (a || "").slice(0,6) + "…" + (a || "").slice(-4); }
  function snippet(text, n) {
    const s = (text || "").replace(/\s+/g, " ").trim();
    return s.length <= n ? s : s.slice(0, n - 1) + "…";
  }

  if (!addr || !/^0x[0-9a-f]{40}$/.test(addr)) {
    document.getElementById("name").textContent = "Bad address.";
    return;
  }

  // Direct Goldsky query for things only the subgraph knows (here: the set
  // of collected assets currently owned by this wallet). Kept inline instead
  // of extending SprawlGraph since it's author-page specific.
  const GQL = "https://api.goldsky.com/api/public/project_cmo4yujy1v9de01zhfzy88sqs/subgraphs/sprawl-hybrid/0.1.0/gn";
  async function gql(q, vars) {
    const r = await fetch(GQL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: q, variables: vars || {} }),
    });
    if (!r.ok) throw new Error(`subgraph: ${r.status}`);
    const body = await r.json();
    if (body.errors) throw new Error(JSON.stringify(body.errors));
    return body.data;
  }

  try {
    // On-chain identity via Goldsky; off-chain authored content via our API.
    // Per-creator entity and arc lookups use dedicated by-creator endpoints
    // (backed by DynamoDB byCreator GSIs) so we only pull this author's
    // rows instead of every entity/arc in the system.
    const [onchain, linksResp, votesResp, entitiesResp, arcsResp, ownedData, allCitizens] = await Promise.all([
      SprawlGraph.citizen(addr),
      SprawlAPI.byAuthor(addr, 1000),
      SprawlAPI.votesByVoter(addr, 1000),
      SprawlAPI.entitiesByCreator(addr, 500),
      SprawlAPI.arcsByCreator(addr, 500),
      gql(`query($addr: Bytes!) {
        owned: collectedAssets(first: 1000, where: { owner: $addr }, orderBy: collectedAt, orderDirection: desc) {
          id kind nativeId collectedAt listingPrice
          creator { id name }
        }
        createdSold: sales(first: 1000, where: { asset_: { creator: $addr }, firstSale: true }, orderBy: timestamp, orderDirection: desc) {
          id price buyer timestamp
          asset { kind nativeId }
        }
        # Anything this author created that is currently collected on-chain,
        # regardless of whether it's still with the first collector or has
        # been resold. Used to stamp COLLECTED BY on the LINKS / ENTITIES /
        # ARCS rows below.
        createdCollected: collectedAssets(first: 1000, where: { creator: $addr }) {
          kind nativeId owner
        }
      }`, { addr }),
      // Fetch every citizen once so we can show a username anywhere an
      // address would otherwise appear (buyers in CREATED ITEMS SOLD, etc.).
      SprawlGraph.citizens(1000),
    ]);

    // Build address → name lookup. Falls through to shortAddr when the wallet
    // isn't registered (unusual for buyers since register is a prerequisite
    // for writing, but not for collecting).
    const nameByAddr = {};
    for (const c of (allCitizens || [])) {
      nameByAddr[c.id.toLowerCase()] = c.name;
    }
    function displayName(a) {
      const key = (a || "").toLowerCase();
      const n = nameByAddr[key];
      // Names rendered uppercase for site-wide consistency; short-address
      // fallback keeps its natural hex casing.
      return n ? n.toUpperCase() : shortAddr(a);
    }

    // Unregistered addresses are valid profile targets — they can own
    // collected assets even without a Citizen record. We just skip the
    // "REGISTERED AT BLOCK" line and use a shortened address as the name.
    // Registered names render uppercase (site convention); the short-hex
    // fallback keeps its natural case so "0x1234…abcd" doesn't become
    // "0X1234…ABCD".
    const isRegistered = !!onchain;
    const identityAddr = isRegistered ? onchain.id : addr;
    const hasName      = isRegistered && onchain.name;
    // Page title uses whatever we can display — full address for the
    // unregistered case. The H2, though, is ONLY a name: when there's
    // no registered username we leave it blank so the short-hex doesn't
    // duplicate the full address line just below it.
    document.title = "Sprawl — " + (hasName ? onchain.name : shortAddr(identityAddr));
    const nameEl = document.getElementById("name");
    if (hasName) {
      nameEl.innerHTML =
        escapeHtml(onchain.name.toUpperCase()) +
        (onchain.isBanned ? ' <span class="banned-tag">| BANNED</span>' : "");
    } else {
      nameEl.remove();
    }
    const explorerHref = `https://sepolia.etherscan.io/address/${identityAddr}`;
    document.getElementById("addr").innerHTML =
      // DISCONNECT sits inline with the address and is gated to the
      // own-profile view. It clears the wallet state, sets a sticky
      // "stay disconnected" flag so reloads don't auto-reconnect, and
      // (best-effort) asks the wallet to revoke its permission.
      `<div class="line"><a href="${explorerHref}" target="_blank" rel="noopener">${escapeHtml(identityAddr)}</a><span class="own-only"> | <a class="act-disconnect" href="#">DISCONNECT</a></span></div>` +
      (isRegistered
        ? `<div class="line">REGISTERED AT BLOCK ${escapeHtml(String(onchain.registeredAtBlock || onchain.registeredAt))}</div>`
        // REGISTER link, also own-only. Click hand-off via the
        // delegated listener further down.
        : `<div class="line">NOT REGISTERED AS AN AUTHOUR<span class="own-only"> | <a class="act-register" href="#">REGISTER</a></span></div>`);

    const all      = (linksResp    && linksResp.items)    || [];
    const votes    = (votesResp    && votesResp.items)    || [];
    // The by-creator endpoints already filter server-side via the GSI.
    const entities = (entitiesResp && entitiesResp.items) || [];
    const arcs     = (arcsResp    && arcsResp.items)    || [];
    const owned      = (ownedData && ownedData.owned)       || [];
    const createdSold = (ownedData && ownedData.createdSold) || [];

    // Lookup: (kind, nativeId) → current owner address. Used below to stamp
    // COLLECTED BY on each LINKS / ENTITIES / ARCS row when applicable.
    const collectedOwnerByKey = new Map();
    for (const a of ((ownedData && ownedData.createdCollected) || [])) {
      collectedOwnerByKey.set(`${a.kind}:${a.nativeId}`, (a.owner || "").toLowerCase());
    }
    function collectedBy(kind, nativeId) {
      const ownerAddr = collectedOwnerByKey.get(`${kind}:${nativeId}`);
      if (!ownerAddr) return "";
      const label = displayName(ownerAddr);
      const href  = "author.html?addr=" + encodeURIComponent(ownerAddr);
      return ` | COLLECTED BY <a href="${href}">${escapeHtml(label)}</a>`;
    }
    const links      = all.filter(d => !d.isRecap);
    const recaps     = all.filter(d =>  d.isRecap);

    const counts = [
      ["LINKS",              `${links.length}${recaps.length ? ` (+${recaps.length} recap${recaps.length === 1 ? "" : "s"})` : ""}`],
      ["ENTITIES",           entities.length],
      ["ARCS",               arcs.length],
      ["VOTES CAST",         votes.length],
      ["COLLECTED ITEMS",    owned.length],
      ["CREATED ITEMS SOLD", createdSold.length],
    ];
    document.getElementById("counts").innerHTML = counts
      .map(([k, v]) => `<div class="row"><span class="k">${k}:</span><span>${v}</span></div>`)
      .join("");

    const sections = [];

    if (all.length) {
      const rows = all.map(l => {
        const tag = l.isRecap ? " | recap" : "";
        const body = l.cleared ? "[cleared]" : snippet(l.text, 140);
        const voteCount = l.voteCount || 0;
        const displayId = l.linkId.length <= 8 ? l.linkId : l.linkId.slice(0,12) + "…";
        return `<div class="link-row">
          <div class="head">
            <a href="index.html#link-${encodeURIComponent(l.linkId)}">#${escapeHtml(displayId)}</a>
            | +${escapeHtml(String(voteCount))}${tag}${collectedBy("Link", l.linkId)}
          </div>
          <div class="body">${escapeHtml(body)}</div>
        </div>`;
      }).join("");
      sections.push(`<h3>LINKS</h3>${rows}`);
    }

    if (entities.length) {
      const rows = entities.map(e => {
        const desc = e.description ? snippet(e.description, 140) : "";
        const collectedSub = collectedBy("Entity", e.entityId);
        return `<div class="entity-row">
          <div class="head">[${escapeHtml(e.entityId)}] ${escapeHtml(e.name || "")}</div>
          ${desc ? `<div class="desc">${escapeHtml(desc)}</div>` : ""}
          <div class="sub">${escapeHtml((e.entityType || "").toUpperCase())}${collectedSub}</div>
        </div>`;
      }).join("");
      sections.push(`<h3>ENTITIES</h3>${rows}`);
    }

    if (arcs.length) {
      const rows = arcs.map(a => {
        const desc = a.description ? snippet(a.description, 140) : "";
        const anchor = a.anchorLinkId != null ? String(a.anchorLinkId) : "";
        const collectedSub = collectedBy("Arc", a.arcId);
        const subParts = [];
        if (anchor) subParts.push(`ANCHORED AT <a href="index.html#link-${encodeURIComponent(anchor)}">#${escapeHtml(anchor)}</a>`);
        if (collectedSub) subParts.push(collectedSub.replace(/^\s*\|\s*/, ""));
        return `<div class="arc-row">
          <div class="head">{${escapeHtml(a.arcId)}}</div>
          ${desc ? `<div class="desc">${escapeHtml(desc)}</div>` : ""}
          ${subParts.length ? `<div class="sub">${subParts.join(" | ")}</div>` : ""}
        </div>`;
      }).join("");
      sections.push(`<h3>ARCS</h3>${rows}`);
    }

    if (votes.length) {
      const html = votes
        .map(v => `<a href="index.html#link-${encodeURIComponent(v.linkId)}">#${escapeHtml(v.linkId)}</a>`)
        .join(", ");
      sections.push(`<h3>VOTES</h3><div class="votes-line">${html}</div>`);
    }

    // Content-native labels: links show as #id, entities as [id], arcs as {id}.
    // Shared by both the COLLECTED ITEMS and CREATED ITEMS SOLD sections below.
    function assetHref(kind, nativeId) {
      if (kind === "Link")   return `index.html#link-${encodeURIComponent(nativeId)}`;
      if (kind === "Entity") return `entities.html`;
      if (kind === "Arc")    return `arcs.html`;
      return "#";
    }
    function assetLabel(kind, nativeId) {
      if (kind === "Link")   return `#${escapeHtml(nativeId)}`;
      if (kind === "Entity") return `[${escapeHtml(nativeId)}]`;
      if (kind === "Arc")    return `{${escapeHtml(nativeId)}}`;
      return escapeHtml(String(nativeId));
    }
    function formatEth(weiStr) {
      const wei = BigInt(weiStr || "0");
      if (wei === 0n) return "0 ETH";
      const whole = wei / 10n ** 18n;
      const frac  = wei % 10n ** 18n;
      const fracStr = frac.toString().padStart(18, "0").slice(0, 6).replace(/0+$/, "");
      return fracStr ? `${whole}.${fracStr} ETH` : `${whole} ETH`;
    }

    if (owned.length) {
      // Anything this wallet owns right now (first collection or later purchase).
      // Each row carries data-* attributes for the action-slot renderer:
      //   data-kind / data-native-id identify the asset on-chain
      //   data-listing-wei tracks the current listing price (0 = unlisted)
      // The .row-actions block is rendered empty and only fills in on
      // .own-profile body (see CSS + the own-profile setup below). Action
      // buttons dispatch sprawl:listed / sprawl:unlisted events, which
      // this page listens for to swap LIST <-> UNLIST without reloading.
      const rows = owned.map(a => {
        const creatorAddr = a.creator && a.creator.id;
        const creatorLink = creatorAddr
          ? `<a href="author.html?addr=${encodeURIComponent(creatorAddr)}">${escapeHtml(displayName(creatorAddr))}</a>`
          : "—";
        const listingWei = String(a.listingPrice || "0");
        return `<div class="entity-row collected-row" data-kind="${escapeHtml(a.kind)}" data-native-id="${escapeHtml(String(a.nativeId))}" data-listing-wei="${escapeHtml(listingWei)}">
          <div class="head"><a href="${assetHref(a.kind, a.nativeId)}">${assetLabel(a.kind, a.nativeId)}</a></div>
          <div class="sub">BY ${creatorLink}</div>
          <div class="row-actions own-only"></div>
        </div>`;
      }).join("");
      sections.push(`<h3>COLLECTED ITEMS</h3>${rows}`);
    }

    if (createdSold.length) {
      // First sales only — things this author made that someone else collected.
      // Shows buyer + price so the author can see who collected what. Buyer
      // is linked to their own author page; if they have a registered name
      // it'll be visible there.
      const rows = createdSold.map(s => {
        const a = s.asset || {};
        const buyerAddr = s.buyer;
        const buyerLink = buyerAddr
          ? `<a href="author.html?addr=${encodeURIComponent(buyerAddr)}">${escapeHtml(displayName(buyerAddr))}</a>`
          : "—";
        return `<div class="entity-row">
          <div class="head"><a href="${assetHref(a.kind, a.nativeId)}">${assetLabel(a.kind, a.nativeId)}</a> <span>${formatEth(s.price)}</span></div>
          <div class="sub">COLLECTED BY ${buyerLink}</div>
        </div>`;
      }).join("");
      sections.push(`<h3>CREATED ITEMS SOLD</h3>${rows}`);
    }

    // Note for the own-user path: if they're not registered, or they
    // are but haven't authored anything yet (written links / entities /
    // arcs / had created items sold), drop a short orientation blurb
    // above the sections. CSS gates it to .own-profile so visitors
    // looking at the same page don't see it.
    const hasAuthored = all.length || entities.length || arcs.length || createdSold.length;
    const showNote = !isRegistered || !hasAuthored;
    const noteHtml = showNote
      ? `<div class="profile-note">NOTE: Collecting a Sprawl asset doesn't require you to be registered as an authour. Registering will give you access to voting and writing features. While you can vote and collect from this frontend, writing is only available via the agent kit (for now).</div>`
      : "";
    const emptyHtml = sections.length
      ? ""
      : '<div class="profile-empty" style="color: var(--mute);">(no contributions yet)</div>';
    document.getElementById("sections").innerHTML = noteHtml + sections.join("") + emptyHtml;

    // --------------------------------------------------------------
    // Own-profile affordances: LIST / UNLIST buttons per collected
    // item, plus the WITHDRAW row at the top.
    //
    // We wire everything now so the click handlers are live even if
    // the wallet hasn't reported yet. The visual state is gated by
    // body.own-profile (set/cleared by syncOwnProfile on every
    // wallet event), so until the wallet matches, .own-only blocks
    // stay hidden by CSS.
    // --------------------------------------------------------------

    function renderRowActions(rowEl) {
      const slot = rowEl.querySelector(".row-actions");
      if (!slot) return;
      const wei = BigInt(rowEl.dataset.listingWei || "0");
      if (wei === 0n) {
        slot.innerHTML = `<a class="ctl act-list" href="#">LIST</a>`;
      } else {
        slot.innerHTML = `<span class="price">LISTED ${sprawlActions.formatEth(wei)}</span> · <a class="ctl act-unlist" href="#">UNLIST</a>`;
      }
    }
    // Initial paint of every collected-row action slot.
    document.querySelectorAll(".collected-row").forEach(renderRowActions);

    // Click delegation for LIST / UNLIST. The modal in sprawl-actions
    // takes over once a button is clicked.
    document.getElementById("sections").addEventListener("click", (ev) => {
      const row = ev.target.closest(".collected-row");
      if (!row) return;
      const kind     = (row.dataset.kind || "").toLowerCase();
      const nativeId = row.dataset.nativeId;
      if (ev.target.classList.contains("act-list")) {
        ev.preventDefault();
        sprawlActions.list(kind, nativeId);
      } else if (ev.target.classList.contains("act-unlist")) {
        ev.preventDefault();
        sprawlActions.unlist(kind, nativeId);
      }
    });

    // Delegated click handler for affordances inside #addr:
    //   REGISTER   — unregistered own profile, opens the register modal.
    //   DISCONNECT — any own profile, detaches the wallet and sets the
    //                sticky flag so reloads stay disconnected.
    document.getElementById("addr").addEventListener("click", (ev) => {
      if (ev.target.classList.contains("act-register")) {
        ev.preventDefault();
        sprawlActions.register();
      } else if (ev.target.classList.contains("act-disconnect")) {
        ev.preventDefault();
        sprawlWallet.disconnect();
      }
    });
    window.addEventListener("sprawl:registered", () => {
      // Give the subgraph a second to index the CitizenRegistered event
      // before reloading, otherwise we'd race and re-render as still
      // unregistered. 2s is a conservative margin at testnet scale.
      setTimeout(() => location.reload(), 2000);
    });

    // Optimistic UI on successful list/unlist — update the row's
    // data-listing-wei and re-render its action slot. The subgraph
    // catches up within a few seconds, at which point a page reload
    // reflects the same state.
    function findRow(kind, nativeId) {
      const rows = document.querySelectorAll(".collected-row");
      for (const r of rows) {
        if (r.dataset.kind.toLowerCase() === kind && String(r.dataset.nativeId) === String(nativeId)) return r;
      }
      return null;
    }
    window.addEventListener("sprawl:listed", (e) => {
      const { kind, nativeId, priceWei } = e.detail || {};
      const r = findRow(kind, nativeId);
      if (r) { r.dataset.listingWei = String(priceWei || "0"); renderRowActions(r); }
    });
    window.addEventListener("sprawl:unlisted", (e) => {
      const { kind, nativeId } = e.detail || {};
      const r = findRow(kind, nativeId);
      if (r) { r.dataset.listingWei = "0"; renderRowActions(r); }
    });

    // ----- WITHDRAW slot. Only populated when viewer === addr and the
    //       contract reports a non-zero pendingWithdrawals. Runs on every
    //       wallet change (connect, account switch, chain switch) so it
    //       stays in sync.
    const withdrawSlot = document.getElementById("withdraw-slot");
    async function refreshWithdraw() {
      withdrawSlot.innerHTML = "";
      if (!sprawlWallet.isConnected()) return;
      if (sprawlWallet.getAddress() !== addr) return;
      if (!sprawlWallet.isOnSepolia()) return;
      let pending;
      try {
        const read = sprawlWallet.getReadContract();
        pending = await read.pendingWithdrawals(addr);
      } catch { return; }
      if (!pending || pending === 0n) return;
      withdrawSlot.innerHTML = `<div class="withdraw-row">
        <span class="k">PENDING WITHDRAWAL</span>
        <span class="v">${sprawlActions.formatEth(pending)}</span>
        <a class="ctl act-withdraw" href="#">WITHDRAW</a>
      </div>`;
      withdrawSlot.querySelector(".act-withdraw").addEventListener("click", (ev) => {
        ev.preventDefault();
        sprawlActions.withdraw();
      });
    }
    window.addEventListener("sprawl:withdrew", () => { refreshWithdraw(); });

    function syncOwnProfile(state) {
      const isOwn = state.connected && state.address === addr;
      document.body.classList.toggle("own-profile", isOwn);
      refreshWithdraw();
    }
    // Initial + subscribe for live updates (account/chain change, etc.).
    syncOwnProfile(sprawlWallet.getState());
    sprawlWallet.on(syncOwnProfile);

    // Stagger the page: main's top-level blocks first (name, addr, counts,
    // sections) so the header area reveals as a unit, then the subsection
    // headings + rows inside #sections for a second cascade within it.
    sprawlBoot.stagger(document.querySelector("main"));
    sprawlBoot.stagger(document.getElementById("sections"));
  } catch (e) {
    document.getElementById("name").textContent = "Could not load: " + e.message;
  }
})();
</script>

</body>
</html>
