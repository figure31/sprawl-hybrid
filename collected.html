<style>
  @font-face {
    font-family: 'Sprawl Mono';
    src: url('fonts/GT-Canon-Mono-Regular.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  :root {
    --fg: #000;
    --bg: #fff;
    --mute: #888;
    --rule: 1px;
    --pad: 12px;
    --topbar-h: 44px;
    --controls-h: 36px;     /* matches the panel-header band on the homepage */
    --font-size: 13px;
    --line-height: 1.5;
  }
  html.dark { --fg: #fff; --bg: #000; }
  * { box-sizing: border-box; font-size: inherit; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: 'Sprawl Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: var(--font-size);
    line-height: var(--line-height);
    height: 100%;
    overflow: hidden;
  }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--topbar-h);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 var(--pad);
    border-bottom: var(--rule) solid var(--fg);
    background: var(--bg);
    z-index: 20;
  }
  .topbar > .title,
  .topbar > .title-group  { justify-self: start; }
  .topbar > .nav-middle   { justify-self: center; }
  .topbar > .nav-right    { justify-self: end; }
  /* FEED and MARKETPLACE float at 25% and 75% of the viewport — each
     sits midway between the left/right edge and the centered middle nav,
     so the bar stays symmetric. Absolute-positioned so they don't
     participate in the grid and shift the other columns. */
  .topbar > .nav-feed,
  .topbar > .nav-marketplace {
    position: absolute;
    top: 0; bottom: 0;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
  }
  .topbar > .nav-feed        { left: 25%; }
  .topbar > .nav-marketplace { left: 75%; }
  .topbar .title { letter-spacing: 0.08em; }
  .topbar nav { display: flex; gap: 18px; }
  .topbar nav a.active { text-decoration: none; }

  /* Three equal-width columns filling the viewport, separated by rules.
     The right-side rule on each column (except the last) is a ::after
     pseudo instead of a border, so the boot animation can draw it in
     top→down. `position: relative` on .col anchors that pseudo. */
  .columns {
    position: fixed;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
  }
  .col {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .col::after {
    content: "";
    position: absolute;
    top: 0; bottom: 0; right: 0;
    width: var(--rule);
    background: var(--fg);
  }
  .col:last-child::after { display: none; }
  body.boot .col::after {
    transform: scaleY(0);
    transform-origin: top center;
    animation: boot-drawV 0.6s ease-out 0.15s forwards;
  }
  @keyframes boot-drawV { from { transform: scaleY(0); } to { transform: scaleY(1); } }

  /* Title row pinned at the top of each column, isolated from the feed by
     a horizontal rule. Height locked to --controls-h so it lines up exactly
     with the homepage's text/tree panel headers.
     line-height: 1 on the h2 keeps the text's line box tight to the glyphs,
     so `align-items: center` visually centers the letters within the 36px
     band instead of centering a taller line box that leaves the letters
     sitting above optical center. */
  .col > h2 {
    margin: 0;
    height: var(--controls-h);
    padding: 0 var(--pad);
    display: flex;
    align-items: center;
    line-height: 1;
    border-bottom: var(--rule) solid var(--fg);
    font-size: var(--font-size);
    font-weight: normal;
    letter-spacing: 0.08em;
    background: var(--bg);
  }
  /* Global stat pinned to the right of each column header. Non-clickable
     content → --fg (matches the convention used site-wide). */
  .col > h2 .stat {
    color: var(--fg);
    letter-spacing: 0.04em;
    margin-left: auto;
  }
  .col-body {
    padding: var(--pad);
    overflow-y: auto;
    flex: 1;
  }

  /* A collector "cell" wraps the collector's h3 AND all their items,
     so hovering anywhere lights up the whole group as one block.
     Only the collector username inside h3 reads in --mute (it's the
     only clickable that signals "this goes to a profile"); everything
     else — shortAddr, count, item labels, creator credits — stays
     --fg so the section reads as content, not as a sea of links. */
  .collector-group {
    margin: 0 calc(-1 * var(--pad));
    padding: 0.5em var(--pad);
    color: var(--fg);
    cursor: pointer;
  }
  .collector-group h3 {
    margin: 0 0 2px 0;
    font-size: var(--font-size);
    font-weight: normal;
    letter-spacing: 0.08em;
    color: var(--fg);
  }
  /* Only the collector username (the named anchor inside h3) is
     --mute. Everything else in the collector group stays --fg. */
  .collector-group h3 .owner-name { color: var(--mute); }

  .collector-group:hover {
    background: var(--hl);
    color: var(--bg);
  }
  .collector-group:hover h3,
  .collector-group:hover .item,
  .collector-group:hover .item a { color: var(--bg); }
  .collector-group:hover h3 .owner-name { color: var(--mute); }
  .collector-group:hover h3 .owner-name:hover,
  .collector-group:hover .item a:hover { color: var(--bg); }

  /* Each .item inside a collector group is one text line — no vertical
     padding, so the list reads like a paragraph under the owner. */
  .item { margin: 0; padding: 0; }

  /* Sales + listings stay as individual cells, same colour logic as
     the collectors group: everything inside is --fg so the rows read
     as content, not a stack of --mute links. The only --mute element
     in a listing is the BUY action — the equivalent of the collector
     username in the other column, the one item that needs to signal
     "this is the primary interaction". Sales rows have no --mute
     element since there's no single dominant action on a sale. */
  .row,
  .listing-row {
    margin: 0 calc(-1 * var(--pad));
    padding: 0.5em var(--pad);
    cursor: pointer;
    color: var(--fg);
  }
  /* Asset label (link #id, entity [id], arc {id}) on the first line
     of each sale / listing is the "distinguishing clickable" — parallel
     to the owner-name in a collector group. Stays --mute at rest AND on
     cell hover; sub-hover on a Link asset-label flips to --bg. */
  .row .asset-label,
  .listing-row .asset-label { color: var(--mute); }

  .row:hover,
  .listing-row:hover {
    background: var(--hl);
    color: var(--bg);
  }
  /* .price has an explicit color: var(--fg) at rest — inheritance
     doesn't reach it on hover, so override explicitly. */
  .row:hover .price,
  .listing-row:hover .price { color: var(--bg); }
  /* Asset label stays --mute on cell hover (mirrors owner-name). */
  .row:hover .asset-label,
  .listing-row:hover .asset-label { color: var(--mute); }
  /* Sub-hover on the asset link (Link kind only) or any other anchor
     flips to --bg for focus. */
  .row:hover a:hover,
  .listing-row:hover a:hover { color: var(--bg); }

  /* .meta inline spans inherit --fg from the row at rest and flip to
     --bg on cell hover along with the rest of the content. */
  .meta  { letter-spacing: 0.04em; }
  .price { color: var(--fg); }
  .empty { color: var(--mute); }

  /* Listing top line: the asset label + price on the left, the BUY
     action pushed to the right with space-between. `align-items:
     baseline` keeps BUY aligned with the price's text baseline rather
     than floating vertically centered. min-width: 0 on the first
     flex child lets it shrink when the asset label is long; the BUY
     slot refuses to shrink so it always stays visible on the right. */
  .listing-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  .listing-head > span:first-child {
    min-width: 0;
    overflow-wrap: anywhere;
  }
  .listing-head .act-buy { flex-shrink: 0; }
  .listing-head .act-buy {
    cursor: pointer;
    user-select: none;
    color: var(--mute);
    letter-spacing: 0.04em;
  }
  /* BUY is an action button — on sub-hover inside the hovered listing
     cell, flip to --bg with no underline (the chip background is
     redundant against the already-inverted cell). */
  .listing-head .act-buy:hover {
    text-decoration: none;
    color: var(--bg);
  }
  .listing-head .act-buy.hidden { display: none; }

  /* Narrow screens: stack the columns top-to-bottom, reorder them so
     LISTINGS (what's actively available) comes first, SALES (recent
     activity) next, COLLECTORS (ownership list) last — this mirrors the
     "buy / see / explore" priority a mobile reader actually wants.
     Each section header also becomes a collapse toggle. */
  @media (max-width: 900px) {
    html, body { overflow: auto; height: auto; }
    .columns {
      position: static;
      display: flex;
      flex-direction: column;
    }
    #col-listings   { order: 1; }
    #col-sales      { order: 2; }
    #col-collectors { order: 3; }

    .col {
      overflow: visible;
      border-bottom: var(--rule) solid var(--fg);
    }
    .col::after { display: none; }  /* vertical divider off on narrow screens */
    /* Section that renders first visually needs to clear the fixed topbar.
       With the mobile order above, LISTINGS is always first. */
    #col-listings { margin-top: var(--topbar-h); }
    .col-body { overflow: visible; }

    /* Click-to-collapse. Tapping the header toggles .collapsed on the
       section; the body hides, the chevron flips direction. When the
       section is closed we drop the header's bottom rule so two closed
       sections back-to-back read as a single band instead of a
       double-bordered strip. */
    .col > h2 {
      cursor: pointer;
      user-select: none;
    }
    .col > h2::after {
      content: "▾";
      color: var(--mute);
      margin-left: 10px;
      font-size: 0.85em;
      transition: transform 150ms ease;
    }
    .col.collapsed > h2::after { content: "▸"; }
    .col.collapsed > h2        { border-bottom: 0; }
    .col.collapsed .col-body   { display: none; }
  }
</style>

<script>
(async () => {
  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, c => (
      {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
    ));
  }
  function shortAddr(a) {
    if (!a) return "—";
    return a.slice(0, 6) + "…" + a.slice(-4);
  }
  function formatEth(weiStr) {
    // Goldsky returns BigInt as string. Display 4 significant digits.
    const wei = BigInt(weiStr || "0");
    if (wei === 0n) return "0 ETH";
    const whole = wei / 10n ** 18n;
    const frac  = wei % 10n ** 18n;
    const fracStr = frac.toString().padStart(18, "0").slice(0, 6).replace(/0+$/, "");
    return fracStr ? `${whole}.${fracStr} ETH` : `${whole} ETH`;
  }
  function assetHref(kind, nativeId) {
    if (kind === "Link") return `index.html#link-${encodeURIComponent(nativeId)}`;
    return "#";
  }
  function assetLabel(kind, nativeId) {
    if (kind === "Link")   return `#${escapeHtml(nativeId)}`;
    if (kind === "Entity") return `[${escapeHtml(nativeId)}]`;
    if (kind === "Arc")    return `{${escapeHtml(nativeId)}}`;
    return escapeHtml(String(nativeId));
  }
  // Only Link kinds render as anchors — entities.html / arcs.html
  // aren't deep-linkable per item, so their labels read as plain text.
  // Either way the label gets the .asset-label class so sales and
  // listings can style it as the --mute distinguishing element on
  // the first line of each cell.
  function assetMarkup(kind, nativeId) {
    const label = assetLabel(kind, nativeId);
    return kind === "Link"
      ? `<a class="asset-label" href="${assetHref(kind, nativeId)}">${label}</a>`
      : `<span class="asset-label">${label}</span>`;
  }
  function authorHref(addr) {
    return "author.html?addr=" + encodeURIComponent(addr);
  }

  // nameByAddr populated once upfront; used to show usernames wherever we'd
  // otherwise only have a hex address. Names are rendered in all-caps to
  // match the site's display convention for author names; the short-address
  // fallback keeps its natural hex casing so "0xabc…" doesn't turn into "0XABC…".
  let nameByAddr = {};
  function displayName(addr) {
    const a = (addr || "").toLowerCase();
    const n = nameByAddr[a];
    return n ? n.toUpperCase() : shortAddr(addr);
  }

  // Graphql helper (collected.html runs its own queries; keeps sprawl-data.js lean)
  const GQL = "https://api.goldsky.com/api/public/project_cmo4yujy1v9de01zhfzy88sqs/subgraphs/sprawl-hybrid/0.1.0/gn";
  async function query(q) {
    const r = await fetch(GQL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: q }),
    });
    if (!r.ok) throw new Error(`subgraph: ${r.status}`);
    const body = await r.json();
    if (body.errors) throw new Error(JSON.stringify(body.errors));
    return body.data;
  }

  async function loadNames() {
    try {
      const data = await query(`{ citizens(first: 1000) { id name } }`);
      for (const c of (data.citizens || [])) {
        nameByAddr[c.id.toLowerCase()] = c.name;
      }
    } catch (e) {
      // Fall back silently — names just won't resolve, addresses still work.
    }
  }

  // Shared scroll-sentinel helper. Each column calls it after rendering with
  // a callback that bumps its own limit + re-renders. The column's scroll
  // container is `.col-body`, so we observe from that root and fire when the
  // sentinel enters its viewport.
  function attachLoadMore(bodyEl, onLoadMore) {
    const existing = bodyEl.querySelector(".load-sentinel");
    if (existing) existing.remove();
    const sentinel = document.createElement("div");
    sentinel.className = "load-sentinel";
    sentinel.style.height = "1px";
    bodyEl.appendChild(sentinel);
    const io = new IntersectionObserver(async (entries) => {
      if (!entries.some(e => e.isIntersecting)) return;
      io.unobserve(sentinel);
      await onLoadMore();
    }, { root: bodyEl, rootMargin: "200px" });
    io.observe(sentinel);
  }

  // — Collectors column — scrolls independently; paginates in bumps of 50.
  let collectorsLimit = 50;
  async function renderCollectors() {
    const el = document.getElementById("collectors-body");
    try {
      const data = await query(`{
        collectedAssets(first: ${collectorsLimit}, orderBy: collectedAt, orderDirection: desc) {
          id kind nativeId owner collectedAt
          creator { id name }
        }
      }`);
      const assets = data.collectedAssets || [];
      if (!assets.length) { el.innerHTML = `<div class="empty">(nothing collected yet)</div>`; return; }

      const byOwner = {};
      for (const a of assets) {
        const k = (a.owner || "").toLowerCase();
        (byOwner[k] ||= []).push(a);
      }
      const owners = Object.keys(byOwner).sort((a, b) => {
        const diff = byOwner[b].length - byOwner[a].length;
        if (diff) return diff;
        const ra = Math.max(...byOwner[a].map(x => Number(x.collectedAt)));
        const rb = Math.max(...byOwner[b].map(x => Number(x.collectedAt)));
        return rb - ra;
      });

      const html = [];
      for (const addr of owners) {
        const items = byOwner[addr];
        const name = nameByAddr[addr];
        // The owner's name link is the only --mute element inside the
        // group; the count renders as plain --fg content next to it.
        // Unregistered owners fall back to the shortened address as
        // their only identifier.
        const nameLink = `<a class="owner-name" href="${authorHref(addr)}">${escapeHtml(name ? name.toUpperCase() : shortAddr(addr))}</a>`;
        // Whole collector block is one clickable cell (navigates to the
        // owner's profile). Inner anchors on individual items still
        // preempt the cell-click handler.
        const itemsHtml = items.map(a => {
          const creatorAddr = a.creator && a.creator.id;
          const creatorLabel = creatorAddr ? displayName(creatorAddr) : "—";
          return `<div class="item" data-kind="${escapeHtml(a.kind)}" data-native-id="${escapeHtml(String(a.nativeId))}">
            ${assetMarkup(a.kind, a.nativeId)}
            by <a href="${authorHref(creatorAddr)}">${escapeHtml(creatorLabel)}</a>
          </div>`;
        }).join("");
        html.push(`<div class="collector-group" data-owner="${escapeHtml(addr)}">
          <h3>${nameLink} (${items.length})</h3>
          ${itemsHtml}
        </div>`);
      }
      el.innerHTML = html.join("");
      sprawlBoot.stagger(el);
      if (assets.length >= collectorsLimit) {
        attachLoadMore(el, async () => { collectorsLimit += 50; await renderCollectors(); });
      }
    } catch (e) {
      el.textContent = `could not load: ${e.message}`;
    }
  }

  let salesLimit = 50;
  async function renderSales() {
    const el = document.getElementById("sales-body");
    try {
      const data = await query(`{
        sales(first: ${salesLimit}, orderBy: timestamp, orderDirection: desc) {
          id firstSale listingPrice seller buyer timestamp
          asset { kind nativeId creator { id name } }
        }
      }`);
      const sales = data.sales || [];
      if (!sales.length) { el.innerHTML = `<div class="empty">(no sales yet)</div>`; return; }

      const html = [];
      for (const s of sales) {
        const a = s.asset || {};
        const tag = s.firstSale ? "FIRST SALE" : "RESALE";
        // Sale.id is "{txhash}-{logindex}" per the subgraph schema. Split to
        // get the raw tx hash; link it to the Mainnet explorer so anyone can
        // inspect the on-chain record directly.
        const txHash = (s.id || "").split("-")[0];
        const txShort = txHash ? txHash.slice(0, 10) + "…" + txHash.slice(-4) : "";
        const txLink = txHash
          ? `<a href="https://etherscan.io/tx/${txHash}" target="_blank" rel="noopener">${txShort}</a>`
          : "";
        html.push(`<div class="row" data-kind="${escapeHtml(a.kind)}" data-native-id="${escapeHtml(String(a.nativeId))}">
          <div>
            ${assetMarkup(a.kind, a.nativeId)}
            <span class="price">${formatEth(s.listingPrice)}</span>
          </div>
          <div class="meta">${tag} | ${txLink}</div>
          <div class="meta"><a href="${authorHref(s.seller)}">${escapeHtml(displayName(s.seller))}</a> → <a href="${authorHref(s.buyer)}">${escapeHtml(displayName(s.buyer))}</a></div>
        </div>`);
      }
      el.innerHTML = html.join("");
      sprawlBoot.stagger(el);
      if (sales.length >= salesLimit) {
        attachLoadMore(el, async () => { salesLimit += 50; await renderSales(); });
      }
    } catch (e) {
      el.textContent = `could not load: ${e.message}`;
    }
  }

  let listingsLimit = 50;
  async function renderListings() {
    const el = document.getElementById("listings-body");
    try {
      const data = await query(`{
        listings(first: ${listingsLimit}, where: { price_gt: "0" }, orderBy: updatedAt, orderDirection: desc) {
          id price owner updatedAt
          asset { kind nativeId creator { id name } }
        }
      }`);
      const listings = data.listings || [];
      if (!listings.length) { el.innerHTML = `<div class="empty">(nothing listed)</div>`; return; }

      const html = [];
      for (const l of listings) {
        const a = l.asset || {};
        const creatorAddr = a.creator && a.creator.id;
        const creatorLabel = creatorAddr ? displayName(creatorAddr) : "—";
        // data-* attributes on the row carry everything the BUY handler
        // needs (kind / nativeId / priceWei / owner / creator) without
        // a secondary lookup. data-owner drives the "hide BUY when
        // viewer == owner" sync that runs on every wallet-state change.
        const creatorRegName = (a.creator && a.creator.name) || "";
        html.push(`<div class="row listing-row"
             data-kind="${escapeHtml(a.kind)}"
             data-native-id="${escapeHtml(String(a.nativeId))}"
             data-price-wei="${escapeHtml(String(l.price))}"
             data-owner="${escapeHtml((l.owner || "").toLowerCase())}"
             data-creator="${escapeHtml((creatorAddr || "").toLowerCase())}"
             data-creator-name="${escapeHtml(creatorRegName)}">
          <div class="listing-head">
            <span>
              ${assetMarkup(a.kind, a.nativeId)}
              <span class="price">${formatEth(l.price)}</span>
            </span>
            <a class="act-buy" href="#">BUY</a>
          </div>
          <div class="meta">by <a href="${authorHref(creatorAddr)}">${escapeHtml(creatorLabel)}</a></div>
          <div class="meta">owned by <a href="${authorHref(l.owner)}">${escapeHtml(displayName(l.owner))}</a></div>
        </div>`);
      }
      el.innerHTML = html.join("");
      sprawlBoot.stagger(el);
      syncBuyVisibility();
      if (listings.length >= listingsLimit) {
        attachLoadMore(el, async () => { listingsLimit += 50; await renderListings(); });
      }
    } catch (e) {
      el.textContent = `could not load: ${e.message}`;
    }
  }

  // Hide the BUY button on any listing whose owner matches the connected
  // wallet (the contract rejects self-purchase; no reason to offer it).
  // Runs after every render + every wallet-state change.
  function syncBuyVisibility() {
    const me = sprawlWallet && sprawlWallet.isConnected() ? sprawlWallet.getAddress() : null;
    document.querySelectorAll(".listing-row").forEach(row => {
      const btn = row.querySelector(".act-buy");
      if (!btn) return;
      const owner = (row.dataset.owner || "").toLowerCase();
      const hide = me && me === owner;
      btn.classList.toggle("hidden", !!hide);
    });
  }

  // Global stats shown next to each column title. Runs in parallel with
  // the column renders since it has no dependency on the name map.
  //   Collectors = unique owner addresses across all on-chain collected
  //                assets. ProtocolStats doesn't track this directly so
  //                we fold a first-1000 owner projection into a Set.
  //   Sales      = totalVolume from ProtocolStats (wei, formatted as ETH).
  //   Listings   = count of active listings (price > 0). Again not a
  //                direct stat, but the first-1000 id projection is
  //                small and gives the count client-side.
  // The 1000 cap matches the subgraph's per-query limit; at current
  // scale we're well below it. If either set ever grows past 1000,
  // switch to paginated counting or add a dedicated aggregate field
  // to ProtocolStats in the subgraph.
  async function renderStats() {
    try {
      const data = await query(`{
        protocolStats(id: "global") { totalVolume }
        collectedAssets(first: 1000) { owner }
        listings(first: 1000, where: { price_gt: "0" }) { id }
      }`);
      const volume = (data.protocolStats && data.protocolStats.totalVolume) || "0";
      const uniqueOwners = new Set((data.collectedAssets || []).map(a => (a.owner || "").toLowerCase()));
      const activeListings = (data.listings || []).length;
      document.getElementById("stat-collectors").textContent = uniqueOwners.size;
      document.getElementById("stat-sales").textContent      = formatEth(volume);
      document.getElementById("stat-listings").textContent   = activeListings;
    } catch (e) {
      // Leave the "—" placeholders if the stats query fails; the columns
      // themselves are independent and will still render.
    }
  }

  // --- BUY click + wallet-state + post-action listeners -------------
  // Click delegation for the BUY affordance on any .listing-row. We
  // hand off to sprawlActions with the creator + owner we already
  // know from the listing query, so the modal doesn't have to
  // re-fetch them.
  document.body.addEventListener("click", (ev) => {
    const btn = ev.target.closest(".act-buy");
    if (!btn) return;
    ev.preventDefault();
    const row = btn.closest(".listing-row");
    if (!row) return;
    const kind = (row.dataset.kind || "").toLowerCase();
    const nativeId = row.dataset.nativeId;
    const priceWei = row.dataset.priceWei;
    const ownerAddr = (row.dataset.owner || "").toLowerCase();
    const creatorAddr = (row.dataset.creator || "").toLowerCase();
    const creatorName = row.dataset.creatorName || "";
    sprawlActions.buy(kind, nativeId, priceWei, {
      creatorAddr, creatorName,
      ownerAddr,
      ownerName: nameByAddr[ownerAddr] || "",
    });
  });

  // Click anywhere on a Link-kind cell (sales / listings rows, or
  // items inside a collector group) navigates to that link. Clicking
  // empty space inside a .collector-group (not on an item or anchor)
  // navigates to the owner's profile. Inner anchors + BUY preempt.
  document.querySelectorAll(".columns").forEach(el => {
    el.addEventListener("click", (ev) => {
      if (ev.target.closest("a, .act-buy")) return;
      const row = ev.target.closest(".item, .row, .listing-row");
      if (row && row.dataset.kind === "Link" && row.dataset.nativeId) {
        location.href = "index.html#link-" + encodeURIComponent(row.dataset.nativeId);
        return;
      }
      const group = ev.target.closest(".collector-group");
      if (group && group.dataset.owner) {
        location.href = "author.html?addr=" + encodeURIComponent(group.dataset.owner);
      }
    });
  });

  // Re-sync BUY visibility every time the wallet state changes so
  // "owner == viewer" stays accurate as the user switches accounts.
  if (window.sprawlWallet) sprawlWallet.on(() => syncBuyVisibility());

  // Optimistic updates. On a successful purchase we drop the row from
  // the LISTINGS column (the subgraph will surface it under the new
  // owner in COLLECTORS shortly). Same pattern for UNLIST — the row
  // no longer belongs in LISTINGS either.
  function removeListingRow(kind, nativeId) {
    const want = String(kind || "").toLowerCase();
    const wantId = String(nativeId);
    document.querySelectorAll(".listing-row").forEach(row => {
      const k = (row.dataset.kind || "").toLowerCase();
      if (k === want && String(row.dataset.nativeId) === wantId) row.remove();
    });
  }
  window.addEventListener("sprawl:bought",   (e) => removeListingRow(e.detail.kind, e.detail.nativeId));
  window.addEventListener("sprawl:unlisted", (e) => removeListingRow(e.detail.kind, e.detail.nativeId));

  // Load the name map first so every column can resolve usernames. Then
  // render all three columns and the global stats in parallel.
  await loadNames();
  await Promise.all([renderStats(), renderCollectors(), renderSales(), renderListings()]);
})();
</script>
</body>
</html>
