<style>
  @font-face {
    font-family: 'Sprawl Mono';
    src: url('fonts/GT-Canon-Mono-Regular.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  html.dark { --fg: #fff; --bg: #000; }
  :root {
    --fg: #000;
    --bg: #fff;
    --mute: #888;
    --rule: 1px;
    --pad: 12px;
    --topbar-h: 44px;
    --font-size: 13px;
    --line-height: 1.5;
  }
  * { box-sizing: border-box; font-size: inherit; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: 'Sprawl Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: var(--font-size);
    line-height: var(--line-height);
    min-height: 100%;
  }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--topbar-h);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 var(--pad);
    border-bottom: var(--rule) solid var(--fg);
    background: var(--bg);
    z-index: 20;
  }
  .topbar > .title,
  .topbar > .title-group  { justify-self: start; }
  .topbar > .nav-middle   { justify-self: center; }
  .topbar > .nav-right    { justify-self: end; }
  /* FEED and MARKETPLACE float at 25% and 75% of the viewport — each
     sits midway between the left/right edge and the centered middle nav,
     so the bar stays symmetric. Absolute-positioned so they don't
     participate in the grid and shift the other columns. */
  .topbar > .nav-feed,
  .topbar > .nav-marketplace {
    position: absolute;
    top: 0; bottom: 0;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
  }
  .topbar > .nav-feed        { left: 25%; }
  .topbar > .nav-marketplace { left: 75%; }
  .topbar .title { letter-spacing: 0.08em; }
  .topbar nav { display: flex; gap: 18px; }
  .topbar nav a.active { text-decoration: none; }

  main {
    max-width: 820px;
    margin: 0 auto;
    padding: calc(var(--topbar-h) + 24px) var(--pad) 48px;
  }
  h2 {
    margin: 0 0 24px 0;
    font-size: var(--font-size);
    font-weight: normal;
    letter-spacing: 0.08em;
  }
  h3 {
    margin: 32px 0 12px 0;
    font-size: var(--font-size);
    font-weight: normal;
    letter-spacing: 0.08em;
    color: var(--mute);
  }
  h3:first-of-type { margin-top: 0; }

  /* Full-bleed row — same pattern as entities.html. */
  body { overflow-x: clip; }
  .arc {
    margin: 0 calc(50% - 50vw);
    padding: 0.75em calc(50vw - 50%);
  }
  /* .id is the arc title row. Flex container so COLLECT can ride on
     the far right end of the title (same pattern as the entities page's
     .name row). */
  .arc .id {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    color: var(--fg);
  }
  .arc .desc { margin-top: 2px; color: var(--fg); }
  /* Meta line carries clickables (ANCHORED AT #N, COLLECTED BY OWNER),
     so the whole line reads in --mute — same convention as the
     homepage meta line and the entities page. */
  .arc .meta { color: var(--mute); margin-top: 4px; letter-spacing: 0.04em; }
  .arc .act-collect,
  .arc .references-toggle { color: var(--mute); letter-spacing: 0.04em; }
  /* COLLECT + MENTIONS: "show" are actions, not destinations — no
     underline on hover. */
  .arc .act-collect:hover,
  .arc .references-toggle:hover { text-decoration: none; }

  /* Cell hover: only non-clickable content (id, desc) flips to --bg.
     Meta stays --mute; sub-hover on an anchor / action flips that
     specific item. */
  .arc:hover {
    background: var(--hl);
    color: var(--bg);
  }
  .arc:hover .id,
  .arc:hover .desc { color: var(--bg); }
  .arc:hover a:hover,
  .arc:hover .act-collect:hover,
  .arc:hover .references-toggle:hover { color: var(--bg); }
</style>

<script>
(async () => {
  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, c => (
      {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
    ));
  }

  try {
    const [resp, citizens, collectedArcs] = await Promise.all([
      SprawlAPI.arcs(1000),
      SprawlGraph.citizens(1000),
      SprawlGraph.collectedAssets(1000, "Arc"),
    ]);
    const arcs = (resp && resp.items) || [];
    const citById = Object.fromEntries((citizens || []).map(c => [c.id.toLowerCase(), c]));
    // arcId → current owner address (only present when collected on-chain).
    const ownerByArc = new Map(
      (collectedArcs || []).map(a => [String(a.nativeId), (a.owner || "").toLowerCase()])
    );
    const nameByAddr = Object.fromEntries((citizens || []).map(c => [c.id.toLowerCase(), c.name]));
    function collectedByMarkup(arcId) {
      const ownerAddr = ownerByArc.get(arcId);
      if (!ownerAddr) return "";
      const label = nameByAddr[ownerAddr]
        ? nameByAddr[ownerAddr].toUpperCase()
        : ownerAddr.slice(0, 6) + "…" + ownerAddr.slice(-4);
      const href = "author.html?addr=" + encodeURIComponent(ownerAddr);
      return `COLLECTED BY <a href="${href}">${escapeHtml(label)}</a>`;
    }
    if (!arcs.length) {
      document.getElementById("list").textContent = "(none yet)";
      return;
    }

    const html = [];
    const fmt = id => id.length <= 8 ? id : id.slice(0, 10) + "…";
    for (const a of arcs) {
      const anchorId = escapeHtml(a.anchorLinkId || "");
      const cit = citById[(a.creator || "").toLowerCase()];
      // Uppercase the registered name for site-wide consistency; raw-hex
      // fallback keeps its natural case.
      const creatorName = cit && cit.name ? cit.name.toUpperCase() : a.creator;
      const creatorHref = "author.html?addr=" + encodeURIComponent(a.creator);
      const creatorHtml = `<a href="${creatorHref}">${escapeHtml(creatorName)}</a>`;
      const collectedMeta = collectedByMarkup(a.arcId);
      // COLLECT rides on the right side of the title row. Only shown
      // when the arc isn't already on-chain AND the reader has a
      // connected wallet (parallel to entities.html).
      const canCollect = !collectedMeta
        && typeof sprawlWallet !== "undefined"
        && sprawlWallet.isConnected();
      const collectAction = canCollect
        ? `<a class="act-collect" href="#" data-arc-id="${escapeHtml(a.arcId)}">COLLECT</a>`
        : "";
      // References deferred until click to avoid one API call per arc at
      // page load. Click handler below replaces the placeholder in place.
      html.push(`<div class="arc" data-arc-id="${escapeHtml(a.arcId)}">
        <div class="id"><span>{${escapeHtml(a.arcId)}}</span>${collectAction}</div>
        ${a.description ? `<div class="desc">${escapeHtml(a.description)}</div>` : ""}
        <div class="meta">BY ${creatorHtml}</div>
        <div class="meta">ANCHORED AT <a href="index.html#link-${anchorId}">#${fmt(anchorId)}</a></div>
        ${collectedMeta ? `<div class="meta">${collectedMeta}</div>` : ""}
        <div class="meta references-row">MENTIONS: <a class="references-toggle" href="#">SHOW</a></div>
      </div>`);
    }
    document.getElementById("list").innerHTML = html.join("") || "(none yet)";
    sprawlBoot.stagger(document.getElementById("list"));

    const listEl = document.getElementById("list");

    // Delegated handler: COLLECT first, then the lazy-references fallback.
    listEl.addEventListener("click", async (ev) => {
      const collectBtn = ev.target.closest(".act-collect");
      if (collectBtn) {
        ev.preventDefault();
        const arcId = collectBtn.dataset.arcId;
        sprawlActions.collect("arc", arcId);
        return;
      }
      const toggle = ev.target.closest(".references-toggle");
      if (!toggle) return;
      ev.preventDefault();
      const row = toggle.closest(".references-row");
      const arcId = toggle.closest(".arc").dataset.arcId;
      if (!arcId) return;
      row.textContent = "MENTIONS: loading…";
      try {
        const resp = await SprawlAPI.arcReferences(arcId, 200);
        const refs = (resp && resp.items) || [];
        row.innerHTML = refs.length
          ? `MENTIONS: ${refs.map(r => `<a href="index.html#link-${r.linkId}">#${fmt(r.linkId)}</a>`).join(", ")}`
          : "not yet referenced";
      } catch (err) {
        row.textContent = "could not load mentions";
      }
    });

    // Optimistic UI after a successful arc collect. Same pattern as
    // entities.html: drop the COLLECT row, insert a COLLECTED BY line.
    window.addEventListener("sprawl:collected", (ev) => {
      const d = (ev && ev.detail) || {};
      if (d.kind !== "arc") return;
      const row = listEl.querySelector(`.arc[data-arc-id="${CSS.escape(d.nativeId)}"]`);
      if (!row) return;
      const actionEl = row.querySelector(".arc-actions");
      if (actionEl) actionEl.remove();
      const ownerAddr = (d.owner || "").toLowerCase();
      const ownerName = nameByAddr[ownerAddr];
      const label = ownerName ? ownerName.toUpperCase() : ownerAddr.slice(0, 6) + "…" + ownerAddr.slice(-4);
      const href  = "author.html?addr=" + encodeURIComponent(ownerAddr);
      const meta  = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = `COLLECTED BY <a href="${href}">${escapeHtml(label)}</a>`;
      const references = row.querySelector(".references-row");
      row.insertBefore(meta, references);
    });
  } catch (e) {
    document.getElementById("list").textContent = "Could not load arcs: " + e.message;
  }
})();
</script>
