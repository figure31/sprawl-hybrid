<style>
  @font-face {
    font-family: 'Sprawl Mono';
    src: url('fonts/GT-Canon-Mono-Regular.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  html.dark { --fg: #fff; --bg: #000; }
  :root {
    --fg: #000;
    --bg: #fff;
    --mute: #888;
    --rule: 1px;
    --pad: 12px;
    --topbar-h: 44px;
    --font-size: 13px;
    --line-height: 1.5;
  }
  * { box-sizing: border-box; font-size: inherit; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: 'Sprawl Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: var(--font-size);
    line-height: var(--line-height);
    min-height: 100%;
  }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--topbar-h);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 var(--pad);
    border-bottom: var(--rule) solid var(--fg);
    background: var(--bg);
    z-index: 20;
  }
  .topbar > .title,
  .topbar > .title-group  { justify-self: start; }
  .topbar > .nav-middle   { justify-self: center; }
  .topbar > .nav-right    { justify-self: end; }
  /* FEED and MARKETPLACE float at 25% and 75% of the viewport — each
     sits midway between the left/right edge and the centered middle nav,
     so the bar stays symmetric. Absolute-positioned so they don't
     participate in the grid and shift the other columns. */
  .topbar > .nav-feed,
  .topbar > .nav-marketplace {
    position: absolute;
    top: 0; bottom: 0;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
  }
  .topbar > .nav-feed        { left: 25%; }
  .topbar > .nav-marketplace { left: 75%; }
  .topbar .title { letter-spacing: 0.08em; }
  .topbar nav { display: flex; gap: 18px; }
  .topbar nav a.active { text-decoration: none; }

  main {
    max-width: 820px;
    margin: 0 auto;
    padding: calc(var(--topbar-h) + 24px) var(--pad) 48px;
  }
  h2 {
    margin: 0 0 24px 0;
    font-size: var(--font-size);
    font-weight: normal;
    letter-spacing: 0.08em;
  }
  h3 {
    margin: 32px 0 12px 0;
    font-size: var(--font-size);
    font-weight: normal;
    letter-spacing: 0.08em;
  }
  h3:first-of-type { margin-top: 0; }

  /* Full-bleed row: negative margin + matching positive padding so the
     hover highlight stretches edge-to-edge while text stays within
     the main column.
     Colour convention inside an entity at rest:
       non-clickable (name, desc, meta labels)  → --fg
       clickable links / actions                 → --mute
     No per-button chip: hovering any child hovers the entity, so the
     cell inversion is what the reader sees. */
  body { overflow-x: clip; }
  .entity {
    margin: 0 calc(50% - 50vw);
    padding: 0.75em calc(50vw - 50%);
  }
  .entity .name {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    color: var(--fg);
  }
  .entity .desc { margin-top: 2px; color: var(--fg); }
  /* Meta lines (BY <AUTHOR>, COLLECTED BY <OWNER>, MENTIONS: …) carry
     clickable names, so the whole line reads in --mute — same
     convention as the homepage meta line. */
  .entity .meta { color: var(--mute); margin-top: 4px; letter-spacing: 0.04em; }
  .entity .act-collect,
  .entity .mentions-toggle { color: var(--mute); letter-spacing: 0.04em; }
  /* COLLECT + MENTIONS: "show" are actions, not destinations — no
     underline on hover. Colour changes are handled by the cell-invert
     rules below. */
  .entity .act-collect:hover,
  .entity .mentions-toggle:hover { text-decoration: none; }

  /* Cell hover: only non-clickable content (name, desc) flips to --bg.
     Meta lines stay --mute (they carry clickables; same convention as
     homepage meta line). Sub-hover on a specific anchor / action flips
     that item to --bg. */
  .entity:hover {
    background: var(--hl);
    color: var(--bg);
  }
  .entity:hover .name,
  .entity:hover .desc { color: var(--bg); }
  .entity:hover a:hover,
  .entity:hover .act-collect:hover,
  .entity:hover .mentions-toggle:hover { color: var(--bg); }
</style>

<script>

<script src="sprawl-data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
<script src="sprawl-modal.js"></script>
<script src="sprawl-wallet.js"></script>
<script src="sprawl-actions.js"></script>
<script src="sprawl-topbar.js"></script>
<script>
(async () => {
  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, c => (
      {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
    ));
  }

  try {
    const [resp, citizens, collectedEnts] = await Promise.all([
      SprawlAPI.entities(1000),
      SprawlGraph.citizens(1000),
      SprawlGraph.collectedAssets(1000, "Entity"),
    ]);
    const entities = (resp && resp.items) || [];
    const citById = Object.fromEntries((citizens || []).map(c => [c.id.toLowerCase(), c]));
    // entityId → current owner address (only present when collected on-chain).
    const ownerByEntity = new Map(
      (collectedEnts || []).map(a => [String(a.nativeId), (a.owner || "").toLowerCase()])
    );
    // Helper to resolve an owner address to a clickable display name.
    const nameByAddr = Object.fromEntries((citizens || []).map(c => [c.id.toLowerCase(), c.name]));
    function collectedByMarkup(entityId) {
      const ownerAddr = ownerByEntity.get(entityId);
      if (!ownerAddr) return "";
      const label = nameByAddr[ownerAddr]
        ? nameByAddr[ownerAddr].toUpperCase()
        : ownerAddr.slice(0, 6) + "…" + ownerAddr.slice(-4);
      const href = "author.html?addr=" + encodeURIComponent(ownerAddr);
      return `COLLECTED BY <a href="${href}">${escapeHtml(label)}</a>`;
    }
    if (!entities.length) {
      document.getElementById("list").textContent = "(none yet)";
      return;
    }

    // Group by type, sort alphabetically within each group.
    const byType = { character: [], place: [], object: [], event: [] };
    for (const e of entities) {
      if (byType[e.entityType]) byType[e.entityType].push(e);
    }
    for (const t in byType) byType[t].sort((a, b) => (a.name||"").localeCompare(b.name||""));

    const labels = { character: "CHARACTERS", place: "PLACES", object: "OBJECTS", event: "EVENTS" };
    const html = [];
    for (const t of ["character", "place", "object", "event"]) {
      if (!byType[t].length) continue;
      html.push(`<h3>${labels[t]}</h3>`);
      for (const e of byType[t]) {
        const cit = citById[(e.creator || "").toLowerCase()];
        // Uppercase the registered name for site-wide consistency; raw-hex
        // fallback keeps its natural case.
        const creatorName = cit && cit.name ? cit.name.toUpperCase() : e.creator;
        const creatorHref = "author.html?addr=" + encodeURIComponent(e.creator);
        const creatorHtml = `<a href="${creatorHref}">${escapeHtml(creatorName)}</a>`;
        const collectedMeta = collectedByMarkup(e.entityId);
        // COLLECT sits on the right of the title row. Only shown when
        // the entity isn't already on-chain AND the reader has a wallet
        // connected (sprawlWallet available once sprawl-wallet.js has
        // loaded — it runs before this render block).
        const canCollect = !collectedMeta
          && typeof sprawlWallet !== "undefined"
          && sprawlWallet.isConnected();
        const collectAction = canCollect
          ? `<a class="act-collect" href="#" data-entity-id="${escapeHtml(e.entityId)}">COLLECT</a>`
          : "";
        // Mentions are deferred until the user clicks — fetching one call per
        // entity at page load doesn't scale. The placeholder's click handler
        // (bound below) replaces itself with the fetched list.
        html.push(`<div class="entity" data-entity-id="${escapeHtml(e.entityId)}">
          <div class="name"><span>[${escapeHtml(e.entityId)}]</span>${collectAction}</div>
          ${e.description ? `<div class="desc">${escapeHtml(e.description)}</div>` : ""}
          <div class="meta">BY ${creatorHtml}</div>
          ${collectedMeta ? `<div class="meta">${collectedMeta}</div>` : ""}
          <div class="meta mentions-row">MENTIONS: <a class="mentions-toggle" href="#">SHOW</a></div>
        </div>`);
      }
    }
    document.getElementById("list").innerHTML = html.join("") || "(none yet)";
    sprawlBoot.stagger(document.getElementById("list"));

    const listEl = document.getElementById("list");

    // Delegated click handler for both mentions (lazy-loaded) and the
    // COLLECT button. The mentions branch keeps first paint cheap by
    // deferring the per-entity fetch until the reader asks for it;
    // the COLLECT branch hands off to sprawl-actions, which drives
    // its own modal.
    listEl.addEventListener("click", async (ev) => {
      const collectBtn = ev.target.closest(".act-collect");
      if (collectBtn) {
        ev.preventDefault();
        const id = collectBtn.dataset.entityId;
        const row = collectBtn.closest(".entity");
        const name = row ? (row.querySelector(".name") || {}).textContent : id;
        sprawlActions.collect("entity", id, { authorName: name });
        return;
      }

      const toggle = ev.target.closest(".mentions-toggle");
      if (!toggle) return;
      ev.preventDefault();
      const row = toggle.closest(".mentions-row");
      const entityId = toggle.closest(".entity").dataset.entityId;
      if (!entityId) return;
      row.textContent = "MENTIONS: loading…";
      try {
        const resp = await SprawlAPI.entityMentions(entityId, 200);
        const mentions = (resp && resp.items) || [];
        const fmt = id => id.length <= 8 ? id : id.slice(0, 10) + "…";
        row.innerHTML = mentions.length
          ? `MENTIONS: ${mentions.map(m => `<a href="index.html#link-${m.linkId}">#${fmt(m.linkId)}</a>`).join(", ")}`
          : "not yet mentioned";
      } catch (err) {
        row.textContent = "could not load mentions";
      }
    });

    // Optimistic UI after a successful entity collect. Replaces the row's
    // COLLECT slot with a COLLECTED BY … line, using whichever display
    // name we can resolve (citizens name map, else shortened address).
    window.addEventListener("sprawl:collected", (ev) => {
      const d = (ev && ev.detail) || {};
      if (d.kind !== "entity") return;
      const row = listEl.querySelector(`.entity[data-entity-id="${CSS.escape(d.nativeId)}"]`);
      if (!row) return;
      const actionEl = row.querySelector(".entity-actions");
      if (actionEl) actionEl.remove();
      const ownerAddr = (d.owner || "").toLowerCase();
      const ownerName = nameByAddr[ownerAddr];
      const label = ownerName ? ownerName.toUpperCase() : ownerAddr.slice(0, 6) + "…" + ownerAddr.slice(-4);
      const href  = "author.html?addr=" + encodeURIComponent(ownerAddr);
      const meta  = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = `COLLECTED BY <a href="${href}">${escapeHtml(label)}</a>`;
      const mentions = row.querySelector(".mentions-row");
      row.insertBefore(meta, mentions);
    });
  } catch (e) {
    document.getElementById("list").textContent = "Could not load entities: " + e.message;
  }
})();
</script>
