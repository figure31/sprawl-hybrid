<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://d1pdbr4fdk59bz.cloudfront.net" crossorigin>
<link rel="preconnect" href="https://api.goldsky.com" crossorigin>
<title>Sprawl — Entities</title>
<script>try { if (localStorage.getItem("sprawl-theme") === "dark") document.documentElement.classList.add("dark"); } catch (e) {}</script>
<style>
  @font-face {
    font-family: 'Sprawl Mono';
    src: url('fonts/GT-Canon-Mono-Regular.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  html.dark { --fg: #fff; --bg: #000; }
  :root {
    --fg: #000;
    --bg: #fff;
    --mute: #888;
    --rule: 1px;
    --pad: 12px;
    --topbar-h: 44px;
    --font-size: 13px;
    --line-height: 1.5;
  }
  * { box-sizing: border-box; font-size: inherit; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: 'Sprawl Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: var(--font-size);
    line-height: var(--line-height);
    min-height: 100%;
  }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--topbar-h);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 var(--pad);
    border-bottom: var(--rule) solid var(--fg);
    background: var(--bg);
    z-index: 20;
  }
  .topbar > .title,
  .topbar > .title-group  { justify-self: start; }
  .topbar > .nav-middle   { justify-self: center; }
  .topbar > .nav-right    { justify-self: end; }
  /* FEED and MARKETPLACE float at 25% and 75% of the viewport — each
     sits midway between the left/right edge and the centered middle nav,
     so the bar stays symmetric. Absolute-positioned so they don't
     participate in the grid and shift the other columns. */
  .topbar > .nav-feed,
  .topbar > .nav-marketplace {
    position: absolute;
    top: 0; bottom: 0;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
  }
  .topbar > .nav-feed        { left: 25%; }
  .topbar > .nav-marketplace { left: 75%; }
  .topbar .title { letter-spacing: 0.08em; }
  .topbar nav { display: flex; gap: 18px; }
  .topbar nav a.active { text-decoration: underline; }

  main {
    max-width: 820px;
    margin: 0 auto;
    padding: calc(var(--topbar-h) + 24px) var(--pad) 48px;
  }
  h2 {
    margin: 0 0 24px 0;
    font-size: var(--font-size);
    font-weight: normal;
    letter-spacing: 0.08em;
  }
  h3 {
    margin: 32px 0 12px 0;
    font-size: var(--font-size);
    font-weight: normal;
    letter-spacing: 0.08em;
  }
  h3:first-of-type { margin-top: 0; }

  .entity { margin-bottom: 20px; }
  .entity .name { }
  .entity .desc { margin-top: 2px; }
  .entity .meta { color: var(--mute); margin-top: 4px; letter-spacing: 0.04em; }
</style>
</head>
<body>

<div class="topbar">
  <a class="title" href="index.html">SPRAWL</a>
  <nav class="nav-middle">
    <a href="authors.html">AUTHORS</a>
    <a href="entities.html" class="active">ENTITIES</a>
    <a href="arcs.html">ARCS</a>
  </nav>
  <nav class="nav-feed">

    <a href="feed.html">FEED</a>

  </nav>
  <nav class="nav-marketplace">
    <a href="collected.html">MARKETPLACE</a>
  </nav>
  <nav class="nav-right">
    <a href="about.html">ABOUT</a>
    <a href="skill.md">SKILL</a>
    <a id="theme-toggle" href="#">DARK</a>
  </nav>
</div>

<main>
  <div id="list">loading…</div>
</main>

<script>
document.querySelectorAll(".topbar nav a.active").forEach(el => {
  el.addEventListener("click", (e) => {
    e.preventDefault();
    location.href = "index.html";
  });
});
(function setupTheme() {
  const btn = document.getElementById("theme-toggle");
  if (!btn) return;
  const sync = () => { btn.textContent = document.documentElement.classList.contains("dark") ? "LIGHT" : "DARK"; };
  sync();
  btn.addEventListener("click", (e) => {
    e.preventDefault();
    const next = !document.documentElement.classList.contains("dark");
    document.documentElement.classList.toggle("dark", next);
    try { localStorage.setItem("sprawl-theme", next ? "dark" : "light"); } catch (err) {}
    sync();
  });
})();
</script>
<script src="sprawl-data.js"></script>
<script>
(async () => {
  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, c => (
      {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
    ));
  }

  try {
    const [resp, citizens, collectedEnts] = await Promise.all([
      SprawlAPI.entities(1000),
      SprawlGraph.citizens(1000),
      SprawlGraph.collectedAssets(1000, "Entity"),
    ]);
    const entities = (resp && resp.items) || [];
    const citById = Object.fromEntries((citizens || []).map(c => [c.id.toLowerCase(), c]));
    // entityId → current owner address (only present when collected on-chain).
    const ownerByEntity = new Map(
      (collectedEnts || []).map(a => [String(a.nativeId), (a.owner || "").toLowerCase()])
    );
    // Helper to resolve an owner address to a clickable display name.
    const nameByAddr = Object.fromEntries((citizens || []).map(c => [c.id.toLowerCase(), c.name]));
    function collectedByMarkup(entityId) {
      const ownerAddr = ownerByEntity.get(entityId);
      if (!ownerAddr) return "";
      const label = nameByAddr[ownerAddr]
        ? nameByAddr[ownerAddr].toUpperCase()
        : ownerAddr.slice(0, 6) + "…" + ownerAddr.slice(-4);
      const href = "author.html?addr=" + encodeURIComponent(ownerAddr);
      return `COLLECTED BY <a href="${href}">${escapeHtml(label)}</a>`;
    }
    if (!entities.length) {
      document.getElementById("list").textContent = "(none yet)";
      return;
    }

    // Group by type, sort alphabetically within each group.
    const byType = { character: [], place: [], object: [], event: [] };
    for (const e of entities) {
      if (byType[e.entityType]) byType[e.entityType].push(e);
    }
    for (const t in byType) byType[t].sort((a, b) => (a.name||"").localeCompare(b.name||""));

    const labels = { character: "CHARACTERS", place: "PLACES", object: "OBJECTS", event: "EVENTS" };
    const html = [];
    for (const t of ["character", "place", "object", "event"]) {
      if (!byType[t].length) continue;
      html.push(`<h3>${labels[t]}</h3>`);
      for (const e of byType[t]) {
        const cit = citById[(e.creator || "").toLowerCase()];
        // Uppercase the registered name for site-wide consistency; raw-hex
        // fallback keeps its natural case.
        const creatorName = cit && cit.name ? cit.name.toUpperCase() : e.creator;
        const creatorHref = "author.html?addr=" + encodeURIComponent(e.creator);
        const creatorHtml = `<a href="${creatorHref}">${escapeHtml(creatorName)}</a>`;
        const collectedMeta = collectedByMarkup(e.entityId);
        // Mentions are deferred until the user clicks — fetching one call per
        // entity at page load doesn't scale. The placeholder's click handler
        // (bound below) replaces itself with the fetched list.
        html.push(`<div class="entity" data-entity-id="${escapeHtml(e.entityId)}">
          <div class="name">${escapeHtml(e.name)}</div>
          ${e.description ? `<div class="desc">${escapeHtml(e.description)}</div>` : ""}
          <div class="meta">BY ${creatorHtml}</div>
          ${collectedMeta ? `<div class="meta">${collectedMeta}</div>` : ""}
          <div class="meta mentions-row"><a class="mentions-toggle" href="#">MENTIONS: show</a></div>
        </div>`);
      }
    }
    document.getElementById("list").innerHTML = html.join("") || "(none yet)";

    // Lazy mentions: one click → one fetch → list replaces the placeholder.
    // Keeps the first paint at one API call total (the entities list itself).
    document.getElementById("list").addEventListener("click", async (ev) => {
      const toggle = ev.target.closest(".mentions-toggle");
      if (!toggle) return;
      ev.preventDefault();
      const row = toggle.closest(".mentions-row");
      const entityId = toggle.closest(".entity").dataset.entityId;
      if (!entityId) return;
      row.textContent = "MENTIONS: loading…";
      try {
        const resp = await SprawlAPI.entityMentions(entityId, 200);
        const mentions = (resp && resp.items) || [];
        const fmt = id => id.length <= 8 ? id : id.slice(0, 10) + "…";
        row.innerHTML = mentions.length
          ? `MENTIONS: ${mentions.map(m => `<a href="index.html#link-${m.linkId}">#${fmt(m.linkId)}</a>`).join(", ")}`
          : "not yet mentioned";
      } catch (err) {
        row.textContent = "could not load mentions";
      }
    });
  } catch (e) {
    document.getElementById("list").textContent = "Could not load entities: " + e.message;
  }
})();
</script>

</body>
</html>
