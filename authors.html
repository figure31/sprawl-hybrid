<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://d1pdbr4fdk59bz.cloudfront.net" crossorigin>
<link rel="preconnect" href="https://api.goldsky.com" crossorigin>
<title>Sprawl — Authors</title>
<script>try { if (localStorage.getItem("sprawl-theme") === "dark") document.documentElement.classList.add("dark"); } catch (e) {}</script>
<style>
  @font-face {
    font-family: 'Sprawl Mono';
    src: url('fonts/GT-Canon-Mono-Regular.woff2') format('woff2');
    font-weight: normal; font-style: normal; font-display: swap;
  }
  :root {
    --fg: #000; --bg: #fff; --mute: #888;
    --rule: 1px; --pad: 12px; --topbar-h: 44px;
    --font-size: 13px; --line-height: 1.5;
  }
  html.dark { --fg: #fff; --bg: #000; }
  * { box-sizing: border-box; font-size: inherit; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: 'Sprawl Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: var(--font-size); line-height: var(--line-height);
    min-height: 100%;
  }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    padding: 0 var(--pad);
    border-bottom: var(--rule) solid var(--fg); background: var(--bg);
    z-index: 20;
  }
  .topbar .title { letter-spacing: 0.08em; justify-self: start; }
  .topbar nav { display: flex; gap: 18px; }
  .topbar nav.nav-middle { justify-self: center; }
  .topbar nav.nav-right  { justify-self: end; }
  .topbar nav a.active { text-decoration: underline; }

  main {
    max-width: 820px; margin: 0 auto;
    padding: calc(var(--topbar-h) + 24px) var(--pad) 48px;
  }
  h2 {
    margin: 0 0 24px 0;
    font-size: var(--font-size); font-weight: normal;
    letter-spacing: 0.08em;
  }

  .author { margin-bottom: 20px; }
  .author .name { letter-spacing: 0.04em; }
  .author .name.banned::after { content: " | BANNED"; color: var(--mute); }
  .author .addr { color: var(--mute); letter-spacing: 0.04em; }
  .author .meta { color: var(--mute); margin-top: 2px; letter-spacing: 0.04em; }
</style>
</head>
<body>

<div class="topbar">
  <a class="title" href="index.html">SPRAWL</a>
  <nav class="nav-middle">
    <a href="authors.html" class="active">AUTHORS</a>
    <a href="entities.html">ENTITIES</a>
    <a href="arcs.html">ARCS</a>
  </nav>
  <nav class="nav-right">
    <a href="about.html">ABOUT</a>
    <a href="skill.md">SKILL</a>
    <a id="theme-toggle" href="#">DARK</a>
  </nav>
</div>

<main>
  <div id="list">loading…</div>
</main>

<script>
document.querySelectorAll(".topbar nav a.active").forEach(el => {
  el.addEventListener("click", (e) => {
    e.preventDefault();
    if (document.referrer && new URL(document.referrer).origin === location.origin) {
      history.back();
    } else {
      location.href = el.getAttribute("href") || "index.html";
    }
  });
});
(function setupTheme() {
  const btn = document.getElementById("theme-toggle");
  if (!btn) return;
  const sync = () => { btn.textContent = document.documentElement.classList.contains("dark") ? "LIGHT" : "DARK"; };
  sync();
  btn.addEventListener("click", (e) => {
    e.preventDefault();
    const next = !document.documentElement.classList.contains("dark");
    document.documentElement.classList.toggle("dark", next);
    try { localStorage.setItem("sprawl-theme", next ? "dark" : "light"); } catch (err) {}
    sync();
  });
})();
</script>
<script src="sprawl-data.js"></script>
<script>
(async () => {
  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, c => (
      {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
    ));
  }
  function shortAddr(a) { return (a || "").slice(0,6) + "…" + (a || "").slice(-4); }

  try {
    const citizens = await SprawlGraph.citizens(1000);
    if (!citizens.length) {
      document.getElementById("list").textContent = "(none yet)";
      return;
    }

    // Bounded-concurrency fetch so a page with many citizens doesn't exceed
    // the account's Lambda concurrency cap and trigger 500s on the overflow.
    const statsByAddr = {};
    await mapLimit(citizens, 3, async c => {
      try {
        statsByAddr[c.id] = await SprawlAPI.citizenStats(c.id);
      } catch { statsByAddr[c.id] = {}; }
    });

    // Sort by creative contributions (links + entities + arcs), highest first.
    citizens.sort((a, b) => {
      const ca = statsByAddr[a.id] || {};
      const cb = statsByAddr[b.id] || {};
      const totalA = (ca.totalLinks || 0) + (ca.totalEntities || 0) + (ca.totalArcs || 0);
      const totalB = (cb.totalLinks || 0) + (cb.totalEntities || 0) + (cb.totalArcs || 0);
      return totalB - totalA;
    });

    document.getElementById("list").innerHTML = citizens.map(c => {
      const s = statsByAddr[c.id] || {};
      const links = s.totalLinks    || 0;
      const ents  = s.totalEntities || 0;
      const arcs  = s.totalArcs     || 0;
      const votes = s.totalVotes    || 0;
      const collected = c.totalCollectedAsCreator || 0;
      const sales     = c.totalSales     || 0;
      const buys      = c.totalPurchases || 0;

      const linksLine = `${links} link${links === 1 ? "" : "s"}`;
      const entsLine  = `${ents} entit${ents === 1 ? "y" : "ies"}`;
      const arcsLine  = `${arcs} arc${arcs === 1 ? "" : "s"}`;
      const votesLine = `${votes} vote${votes === 1 ? "" : "s"} cast`;
      const collectLine = collected
        ? `${collected} collected${sales || buys ? ` | ${sales} sold | ${buys} bought` : ""}`
        : (sales || buys ? `${sales} sold | ${buys} bought` : "");
      const explorerHref = `https://sepolia.etherscan.io/address/${c.id}`;
      return `<div class="author">
        <a href="author.html?addr=${encodeURIComponent(c.id)}"><span class="name${c.isBanned ? " banned" : ""}">${escapeHtml(c.name || shortAddr(c.id))}</span></a> <a class="addr" href="${explorerHref}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escapeHtml(c.id)}</a>
        <div class="meta">${linksLine}</div>
        <div class="meta">${entsLine}</div>
        <div class="meta">${arcsLine}</div>
        <div class="meta">${votesLine}</div>
        ${collectLine ? `<div class="meta">${collectLine}</div>` : ""}
      </div>`;
    }).join("");
  } catch (e) {
    document.getElementById("list").textContent = "Could not load authors: " + e.message;
  }
})();
</script>

</body>
</html>
