<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://d1pdbr4fdk59bz.cloudfront.net" crossorigin>
<link rel="preconnect" href="https://api.goldsky.com" crossorigin>
<title>Sprawl — Collected</title>
<script>try { if (localStorage.getItem("sprawl-theme") === "dark") document.documentElement.classList.add("dark"); } catch (e) {}</script>
<style>
  @font-face {
    font-family: 'Sprawl Mono';
    src: url('fonts/GT-Canon-Mono-Regular.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  :root {
    --fg: #000;
    --bg: #fff;
    --mute: #888;
    --rule: 1px;
    --pad: 12px;
    --topbar-h: 44px;
    --controls-h: 36px;     /* matches the panel-header band on the homepage */
    --font-size: 13px;
    --line-height: 1.5;
  }
  html.dark { --fg: #fff; --bg: #000; }
  * { box-sizing: border-box; font-size: inherit; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: 'Sprawl Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: var(--font-size);
    line-height: var(--line-height);
    height: 100%;
    overflow: hidden;
  }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--topbar-h);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 var(--pad);
    border-bottom: var(--rule) solid var(--fg);
    background: var(--bg);
    z-index: 20;
  }
  .topbar .title { letter-spacing: 0.08em; justify-self: start; }
  .topbar nav { display: flex; gap: 18px; }
  .topbar nav.nav-middle { justify-self: center; }
  .topbar nav.nav-right  { justify-self: end; }
  .topbar nav a.active { text-decoration: underline; }

  /* Three equal-width columns filling the viewport, separated by rules. */
  .columns {
    position: fixed;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
  }
  .col {
    border-right: var(--rule) solid var(--fg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col:last-child { border-right: none; }

  /* Title row pinned at the top of each column, isolated from the feed by
     a horizontal rule. Height locked to --controls-h so it lines up exactly
     with the homepage's text/tree panel headers.
     line-height: 1 on the h2 keeps the text's line box tight to the glyphs,
     so `align-items: center` visually centers the letters within the 36px
     band instead of centering a taller line box that leaves the letters
     sitting above optical center. */
  .col > h2 {
    margin: 0;
    height: var(--controls-h);
    padding: 0 var(--pad);
    display: flex;
    align-items: center;
    line-height: 1;
    border-bottom: var(--rule) solid var(--fg);
    font-size: var(--font-size);
    font-weight: normal;
    letter-spacing: 0.08em;
    background: var(--bg);
  }
  .col-body {
    padding: var(--pad);
    overflow-y: auto;
    flex: 1;
  }

  h3 {
    margin: 18px 0 6px 0;
    font-size: var(--font-size);
    font-weight: normal;
    letter-spacing: 0.08em;
  }
  h3:first-of-type { margin-top: 0; }

  /* Items sit snug under their group header — no visual break between
     siblings of the same collector. */
  .item  { margin-bottom: 2px; }
  /* Sales/listings rows hold multiple meta lines, so they get breathing
     room between rows while staying tight internally. */
  .row   { margin-bottom: 14px; }
  .meta  { color: var(--mute); letter-spacing: 0.04em; }
  .price { color: var(--fg); }
  .empty { color: var(--mute); }

  /* Narrow screens: stack the columns top-to-bottom. */
  @media (max-width: 900px) {
    html, body { overflow: auto; height: auto; }
    .columns {
      position: static;
      display: block;
    }
    .col {
      border-right: none;
      border-bottom: var(--rule) solid var(--fg);
      overflow: visible;
    }
    .col:first-child { margin-top: var(--topbar-h); }
    .col-body { overflow: visible; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="title" href="index.html">SPRAWL</a>
  <nav class="nav-middle">
    <a href="authors.html">AUTHORS</a>
    <a href="entities.html">ENTITIES</a>
    <a href="arcs.html">ARCS</a>
    <a href="collected.html" class="active">COLLECTED</a>
  </nav>
  <nav class="nav-right">
    <a href="about.html">ABOUT</a>
    <a href="skill.md">SKILL</a>
    <a id="theme-toggle" href="#">DARK</a>
  </nav>
</div>

<div class="columns">
  <section class="col" id="col-collectors">
    <h2>COLLECTORS</h2>
    <div class="col-body" id="collectors-body">loading…</div>
  </section>
  <section class="col" id="col-sales">
    <h2>SALES</h2>
    <div class="col-body" id="sales-body">loading…</div>
  </section>
  <section class="col" id="col-listings">
    <h2>LISTINGS</h2>
    <div class="col-body" id="listings-body">loading…</div>
  </section>
</div>

<script>
document.querySelectorAll(".topbar nav a.active").forEach(el => {
  el.addEventListener("click", (e) => {
    e.preventDefault();
    if (document.referrer && new URL(document.referrer).origin === location.origin) {
      history.back();
    } else {
      location.href = el.getAttribute("href") || "index.html";
    }
  });
});
(function setupTheme() {
  const btn = document.getElementById("theme-toggle");
  if (!btn) return;
  const sync = () => { btn.textContent = document.documentElement.classList.contains("dark") ? "LIGHT" : "DARK"; };
  sync();
  btn.addEventListener("click", (e) => {
    e.preventDefault();
    const next = !document.documentElement.classList.contains("dark");
    document.documentElement.classList.toggle("dark", next);
    try { localStorage.setItem("sprawl-theme", next ? "dark" : "light"); } catch (err) {}
    sync();
  });
})();
</script>
<script src="sprawl-data.js"></script>
<script>
(async () => {
  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, c => (
      {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
    ));
  }
  function shortAddr(a) {
    if (!a) return "—";
    return a.slice(0, 6) + "…" + a.slice(-4);
  }
  function formatEth(weiStr) {
    // Goldsky returns BigInt as string. Display 4 significant digits.
    const wei = BigInt(weiStr || "0");
    if (wei === 0n) return "0 ETH";
    const whole = wei / 10n ** 18n;
    const frac  = wei % 10n ** 18n;
    const fracStr = frac.toString().padStart(18, "0").slice(0, 6).replace(/0+$/, "");
    return fracStr ? `${whole}.${fracStr} ETH` : `${whole} ETH`;
  }
  function assetHref(kind, nativeId) {
    if (kind === "Link")   return `index.html#link-${encodeURIComponent(nativeId)}`;
    if (kind === "Entity") return `entities.html`;
    if (kind === "Arc")    return `arcs.html`;
    return "#";
  }
  function assetLabel(kind, nativeId) {
    if (kind === "Link")   return `#${escapeHtml(nativeId)}`;
    if (kind === "Entity") return `[${escapeHtml(nativeId)}]`;
    if (kind === "Arc")    return `{${escapeHtml(nativeId)}}`;
    return escapeHtml(String(nativeId));
  }
  function authorHref(addr) {
    return "author.html?addr=" + encodeURIComponent(addr);
  }

  // nameByAddr populated once upfront; used to show usernames wherever we'd
  // otherwise only have a hex address.
  let nameByAddr = {};
  function displayName(addr) {
    const a = (addr || "").toLowerCase();
    const n = nameByAddr[a];
    return n ? n : shortAddr(addr);
  }

  // Graphql helper (collected.html runs its own queries; keeps sprawl-data.js lean)
  const GQL = "https://api.goldsky.com/api/public/project_cmo4yujy1v9de01zhfzy88sqs/subgraphs/sprawl-hybrid/0.1.0/gn";
  async function query(q) {
    const r = await fetch(GQL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: q }),
    });
    if (!r.ok) throw new Error(`subgraph: ${r.status}`);
    const body = await r.json();
    if (body.errors) throw new Error(JSON.stringify(body.errors));
    return body.data;
  }

  async function loadNames() {
    try {
      const data = await query(`{ citizens(first: 1000) { id name } }`);
      for (const c of (data.citizens || [])) {
        nameByAddr[c.id.toLowerCase()] = c.name;
      }
    } catch (e) {
      // Fall back silently — names just won't resolve, addresses still work.
    }
  }

  async function renderCollectors() {
    const el = document.getElementById("collectors-body");
    try {
      const data = await query(`{
        collectedAssets(first: 1000, orderBy: collectedAt, orderDirection: desc) {
          id kind nativeId owner collectedAt
          creator { id name }
        }
      }`);
      const assets = data.collectedAssets || [];
      if (!assets.length) { el.innerHTML = `<div class="empty">(nothing collected yet)</div>`; return; }

      // Group by current owner. Rank owners by holding count (desc); ties by
      // most-recent collectedAt so active collectors float up.
      const byOwner = {};
      for (const a of assets) {
        const k = (a.owner || "").toLowerCase();
        (byOwner[k] ||= []).push(a);
      }
      const owners = Object.keys(byOwner).sort((a, b) => {
        const diff = byOwner[b].length - byOwner[a].length;
        if (diff) return diff;
        const ra = Math.max(...byOwner[a].map(x => Number(x.collectedAt)));
        const rb = Math.max(...byOwner[b].map(x => Number(x.collectedAt)));
        return rb - ra;
      });

      const html = [];
      for (const addr of owners) {
        const items = byOwner[addr];
        const name = nameByAddr[addr];
        const label = name
          ? `<a href="${authorHref(addr)}">${escapeHtml(name)}</a> <span class="meta">${shortAddr(addr)}</span>`
          : `<a href="${authorHref(addr)}">${shortAddr(addr)}</a>`;
        html.push(`<h3>${label} <span class="meta">(${items.length})</span></h3>`);
        for (const a of items) {
          const creatorAddr = a.creator && a.creator.id;
          const creatorLabel = creatorAddr ? displayName(creatorAddr) : "—";
          html.push(`<div class="item">
            <a href="${assetHref(a.kind, a.nativeId)}">${assetLabel(a.kind, a.nativeId)}</a>
            <span class="meta">by <a href="${authorHref(creatorAddr)}">${escapeHtml(creatorLabel)}</a></span>
          </div>`);
        }
      }
      el.innerHTML = html.join("");
    } catch (e) {
      el.textContent = `could not load: ${e.message}`;
    }
  }

  async function renderSales() {
    const el = document.getElementById("sales-body");
    try {
      const data = await query(`{
        sales(first: 100, orderBy: timestamp, orderDirection: desc) {
          id firstSale price seller buyer timestamp
          asset { kind nativeId creator { id name } }
        }
      }`);
      const sales = data.sales || [];
      if (!sales.length) { el.innerHTML = `<div class="empty">(no sales yet)</div>`; return; }

      const html = [];
      for (const s of sales) {
        const a = s.asset || {};
        const tag  = s.firstSale ? "FIRST SALE" : "RESALE";
        const when = new Date(Number(s.timestamp) * 1000).toISOString().slice(0, 10);
        html.push(`<div class="row">
          <div>
            <a href="${assetHref(a.kind, a.nativeId)}">${assetLabel(a.kind, a.nativeId)}</a>
            <span class="price">${formatEth(s.price)}</span>
          </div>
          <div class="meta">${tag} · ${when}</div>
          <div class="meta"><a href="${authorHref(s.seller)}">${escapeHtml(displayName(s.seller))}</a> → <a href="${authorHref(s.buyer)}">${escapeHtml(displayName(s.buyer))}</a></div>
        </div>`);
      }
      el.innerHTML = html.join("");
    } catch (e) {
      el.textContent = `could not load: ${e.message}`;
    }
  }

  async function renderListings() {
    const el = document.getElementById("listings-body");
    try {
      const data = await query(`{
        listings(first: 100, where: { price_gt: "0" }, orderBy: updatedAt, orderDirection: desc) {
          id price owner updatedAt
          asset { kind nativeId creator { id name } }
        }
      }`);
      const listings = data.listings || [];
      if (!listings.length) { el.innerHTML = `<div class="empty">(nothing listed)</div>`; return; }

      const html = [];
      for (const l of listings) {
        const a = l.asset || {};
        const creatorAddr = a.creator && a.creator.id;
        const creatorLabel = creatorAddr ? displayName(creatorAddr) : "—";
        html.push(`<div class="row">
          <div>
            <a href="${assetHref(a.kind, a.nativeId)}">${assetLabel(a.kind, a.nativeId)}</a>
            <span class="price">${formatEth(l.price)}</span>
          </div>
          <div class="meta">by <a href="${authorHref(creatorAddr)}">${escapeHtml(creatorLabel)}</a></div>
          <div class="meta">owned by <a href="${authorHref(l.owner)}">${escapeHtml(displayName(l.owner))}</a></div>
        </div>`);
      }
      el.innerHTML = html.join("");
    } catch (e) {
      el.textContent = `could not load: ${e.message}`;
    }
  }

  // Load the name map first so every column can resolve usernames. Then
  // render all three columns in parallel.
  await loadNames();
  await Promise.all([renderCollectors(), renderSales(), renderListings()]);
})();
</script>
</body>
</html>
