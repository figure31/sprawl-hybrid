# Sprawl hybrid subgraph.
#
# Indexes ONLY on-chain events. Off-chain content (uncollected links,
# entities, arcs, votes, mentions) lives in DynamoDB and is served by
# the AWS API. This subgraph covers:
#   - Citizen registry (register, rename, ban, unban)
#   - Collections (link / entity / arc written to chain storage)
#   - Marketplace (list / unlist / sold / withdrawals)
#   - Protocol stats (aggregates across everything above)

type Citizen @entity(immutable: false) {
  id: ID!                        # lowercase hex address
  name: String!
  registeredAt: BigInt!
  registeredAtBlock: BigInt!
  isBanned: Boolean!
  totalCollectedAsCreator: Int!  # assets they authored that got collected
  totalPurchases: Int!           # assets they've bought (first or resale)
  totalSales: Int!               # assets they've sold (creator cut + resale)
  collectedAssets: [CollectedAsset!]! @derivedFrom(field: "creator")
}

# Unified type for anything on-chain: Link, Entity, Arc after collection.
type CollectedAsset @entity(immutable: false) {
  id: ID!                        # "link-<hex>" | "entity-<key>" | "arc-<key>"
  kind: String!                  # "Link" | "Entity" | "Arc"
  nativeId: String!              # link hex | entity string | arc string
  creator: Citizen!
  owner: Bytes!
  collectedAt: BigInt!
  authoredAt: BigInt!
  firstSalePrice: BigInt!        # price paid at collection time
  listingPrice: BigInt!          # current listing (0 if unlisted)
  cleared: Boolean!
  # Kind-specific extras
  parentLinkId: String
  isRecap: Boolean
  coversFromId: String
  coversToId: String
  entityType: String
  anchorLinkId: String
  # Sales history
  sales: [Sale!]! @derivedFrom(field: "asset")
}

# Fast reverse-lookup: keccak(id-string) → the asset. Used when a Listed/Sold
# event comes in with only the bytes32 key.
type AssetKeyLookup @entity(immutable: true) {
  id: ID!                        # 0x-prefixed 32-byte hash hex
  asset: CollectedAsset!
}

type Sale @entity(immutable: true) {
  id: ID!                        # "{txhash}-{logindex}"
  asset: CollectedAsset!
  seller: Bytes!                 # display seller (creator on first sale, owner on resale)
  buyer: Bytes!
  price: BigInt!
  firstSale: Boolean!
  protocolCut: BigInt!
  sellerCut: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
}

type Listing @entity(immutable: false) {
  id: ID!                        # asset id (same as CollectedAsset.id)
  asset: CollectedAsset!
  price: BigInt!                 # current price in wei (0 = unlisted)
  owner: Bytes!
  updatedAt: BigInt!
}

type ProtocolStats @entity(immutable: false) {
  id: ID!                        # always "global"
  totalCitizens: Int!
  totalBanned: Int!
  totalCollectedLinks: Int!
  totalCollectedEntities: Int!
  totalCollectedArcs: Int!
  totalSales: Int!
  totalVolume: BigInt!
  currentFirstSalePrice: BigInt!
  currentOperator: Bytes!
}
