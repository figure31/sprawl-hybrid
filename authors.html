<style>
  @font-face {
    font-family: 'Sprawl Mono';
    src: url('fonts/GT-Canon-Mono-Regular.woff2') format('woff2');
    font-weight: normal; font-style: normal; font-display: swap;
  }
  :root {
    --fg: #000; --bg: #fff; --mute: #888;
    --rule: 1px; --pad: 12px; --topbar-h: 44px;
    --font-size: 13px; --line-height: 1.5;
  }
  html.dark { --fg: #fff; --bg: #000; }
  * { box-sizing: border-box; font-size: inherit; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: 'Sprawl Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: var(--font-size); line-height: var(--line-height);
    min-height: 100%;
  }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    padding: 0 var(--pad);
    border-bottom: var(--rule) solid var(--fg); background: var(--bg);
    z-index: 20;
  }
  .topbar > .title,
  .topbar > .title-group  { justify-self: start; }
  .topbar > .nav-middle   { justify-self: center; }
  .topbar > .nav-right    { justify-self: end; }
  /* FEED and MARKETPLACE float at 25% and 75% of the viewport — each
     sits midway between the left/right edge and the centered middle nav,
     so the bar stays symmetric. Absolute-positioned so they don't
     participate in the grid and shift the other columns. */
  .topbar > .nav-feed,
  .topbar > .nav-marketplace {
    position: absolute;
    top: 0; bottom: 0;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
  }
  .topbar > .nav-feed        { left: 25%; }
  .topbar > .nav-marketplace { left: 75%; }
  .topbar .title { letter-spacing: 0.08em; }
  .topbar nav { display: flex; gap: 18px; }
  .topbar nav a.active { text-decoration: none; }

  main {
    max-width: 820px; margin: 0 auto;
    padding: calc(var(--topbar-h) + 24px) var(--pad) 48px;
  }
  h2 {
    margin: 0 0 24px 0;
    font-size: var(--font-size); font-weight: normal;
    letter-spacing: 0.08em;
  }

  /* Full-bleed row: negative horizontal margins push the row edges to
     the viewport, matching positive padding keeps the text centered
     in the content column. overflow-x: clip on the body prevents
     the wide row from producing a horizontal scrollbar. */
  body { overflow-x: clip; }
  /* .author sets its own base color so all non-anchor descendants
     inherit cleanly — no explicit colors that could get stuck on a
     stale value. Clickables (<a>) have their own --mute rule.
     At rest:  non-clickable text = --fg (inherited), clickables = --mute.
     On hover: non-clickable text = --bg (inherited), clickables = --mute,
                sub-hovered clickable = --bg. */
  .author {
    margin: 0 calc(50% - 50vw);
    padding: 0.75em calc(50vw - 50%);
    cursor: pointer;
    color: var(--fg);
  }
  .author .meta { margin-top: 2px; letter-spacing: 0.04em; }
  .author a { color: var(--mute); }
  .author .name { letter-spacing: 0.04em; }
  .author .name.banned::after { content: " | BANNED"; color: var(--mute); }

  .author:hover {
    background: var(--hl);
    color: var(--bg);
  }
  .author:hover a:hover { color: var(--bg); }
</style>

<script src="sprawl-data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>

<script src="sprawl-wallet.js"></script>

<script src="sprawl-topbar.js"></script>
<script>
(async () => {
  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, c => (
      {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
    ));
  }
  function shortAddr(a) { return (a || "").slice(0,6) + "…" + (a || "").slice(-4); }

  try {
    const citizens = await SprawlGraph.citizens(1000);
    if (!citizens.length) {
      document.getElementById("list").textContent = "(none yet)";
      return;
    }

    // Render immediately, sorted alphabetically by registered name
    // (case-insensitive). Citizens missing a name fall to the end so
    // unnamed/partial records don't shuffle the visible list. Stats
    // (links / entities / arcs / votes counts) arrive lazily per row
    // via IntersectionObserver.
    citizens.sort((a, b) => {
      const an = (a.name || "").toLowerCase();
      const bn = (b.name || "").toLowerCase();
      if (!an && !bn) return 0;
      if (!an) return 1;
      if (!bn) return -1;
      return an.localeCompare(bn);
    });

    const listEl = document.getElementById("list");
    listEl.innerHTML = citizens.map(c => {
      const collected = c.totalPurchases || 0;
      const sold      = c.totalSales     || 0;
      const collectLine = (collected || sold)
        ? `${collected} COLLECTED | ${sold} SOLD`
        : "";
      return `<div class="author boot-item" data-addr="${escapeHtml(c.id)}" data-stats="pending">
        <a href="author.html?addr=${encodeURIComponent(c.id)}"><span class="name${c.isBanned ? " banned" : ""}">${escapeHtml(c.name ? c.name.toUpperCase() : shortAddr(c.id))}</span></a>
        <div class="meta stats-slot">…</div>
        ${collectLine ? `<div class="meta">${collectLine}</div>` : ""}
      </div>`;
    }).join("");
    sprawlBoot.stagger(listEl);

    // Fetch each row's stats only when its entry enters the viewport. Bounded
    // to 3 in-flight requests at a time to respect the account's Lambda
    // concurrency cap; sequence preserved by a small queue.
    const queue = [];
    let inFlight = 0;
    function pump() {
      while (inFlight < 3 && queue.length) {
        const job = queue.shift();
        inFlight++;
        job().finally(() => { inFlight--; pump(); });
      }
    }
    function fetchStatsFor(el) {
      const addr = el.dataset.addr;
      const slot = el.querySelector(".stats-slot");
      queue.push(async () => {
        let s = {};
        try { s = await SprawlAPI.citizenStats(addr) || {}; } catch {}
        const links = s.totalLinks    || 0;
        const ents  = s.totalEntities || 0;
        const arcs  = s.totalArcs     || 0;
        const votes = s.totalVotes    || 0;
        slot.innerHTML =
          `${links} LINK${links === 1 ? "" : "S"}</div>` +
          `<div class="meta">${ents} ENTIT${ents === 1 ? "Y" : "IES"}</div>` +
          `<div class="meta">${arcs} ARC${arcs === 1 ? "" : "S"}</div>` +
          `<div class="meta">${votes} VOTE${votes === 1 ? "" : "S"} CAST`;
      });
      pump();
    }

    const io = new IntersectionObserver((entries) => {
      for (const e of entries) {
        if (!e.isIntersecting) continue;
        const row = e.target;
        if (row.dataset.stats !== "pending") continue;
        row.dataset.stats = "loading";
        fetchStatsFor(row);
        io.unobserve(row);
      }
    }, { rootMargin: "200px" });
    document.querySelectorAll(".author").forEach(el => io.observe(el));

    // Clicking anywhere on the cell navigates to the author's profile.
    // The inner <a> on the name still works for middle-click / open-in-
    // new-tab, but now the whole highlighted cell is the target so the
    // reader doesn't have to aim for the name.
    listEl.addEventListener("click", (ev) => {
      if (ev.target.closest("a")) return;   // inner link handles itself
      const row = ev.target.closest(".author");
      if (!row) return;
      const addr = row.dataset.addr;
      if (addr) location.href = "author.html?addr=" + encodeURIComponent(addr);
    });
  } catch (e) {
    document.getElementById("list").textContent = "Could not load authors: " + e.message;
  }
})();
</script>
