  try { if (localStorage.getItem("sprawl-theme") === "dark") document.documentElement.classList.add("dark"); } catch (e) {}
</script>
<style>
  @font-face {
    font-family: 'Sprawl Mono';
    src: url('fonts/GT-Canon-Mono-Regular.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --fg:   #171718;       /* near-black text + structural lines */
    --bg:   #e0e2e1;       /* page background */
    --mute: #c31a1a;       /* secondary text + non-active tree elements */
    /* --hl is the single "highlighted / active" colour — text cells on
       hover/select fill with it, links/buttons lift to it on hover, and
       the selected tree node + in-path strokes all use it. Defaults to
       --fg; change only this line to test a different accent. */
    --hl:   #202020;
    /* --tr is the tree's "non-active" colour — off-path nodes, edges,
       and recap-rings. Defaults to --mute; override separately to
       experiment with a different tree hue without changing the rest
       of the muted text on the page. */
    --tr:   #343535;
    /* Hover tint on non-selected cells (lighter than --hl). */
    --sel-bg: rgba(0, 0, 0, 0.06);
    --rule: 1px;
    --pad: 12px;
    --topbar-h: 44px;
    --controls-h: 36px;    /* reserved band at top of each panel for its controls */
    --font-size: 13px;
    --line-height: 1.5;
  }

  /* Dark theme — same variable set as :root above, each one tuneable
     independently for dark mode. Edit any line to adjust the dark
     palette without touching the light one. */
  html.dark {
    --fg:   #e0e2e1;                          /* primary text + structural lines */
    --bg:   #171717;                          /* page background */
    --mute: #c22d2d;                          /* secondary text + non-active tree */
    --hl:   #a2a2a2;                          /* highlighted / active colour */
    --tr:   #b4b4b4;                          /* tree's non-active stroke */
    --sel-bg: rgba(255, 255, 255, 0.12);      /* hover tint on non-selected cells */
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Sprawl Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: var(--font-size);
    line-height: var(--line-height);
    height: 100%;
    overflow: hidden;
  }

  /* Consistency guard: no element anywhere gets a different font-size.
     Every text element inherits the body's --font-size. */
  * { font-size: inherit; }

  a { color: inherit; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  /* Top bar — three-section grid: title (left), primary nav (center),
     secondary nav (right). The bottom rule is a ::after pseudo-element
     (not a border) so the boot animation can draw it in from the left. */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--topbar-h);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 var(--pad);
    background: var(--bg);
    z-index: 20;
  }
  .topbar::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: var(--rule);
    background: var(--fg);
  }
  .topbar > .title,
  .topbar > .title-group  { justify-self: start; }
  .topbar > .nav-middle   { justify-self: center; }
  .topbar > .nav-right    { justify-self: end; }
  /* FEED and MARKETPLACE float at 25% and 75% of the viewport — each
     sits midway between the left/right edge and the centered middle nav,
     so the bar stays symmetric. Absolute-positioned so they don't
     participate in the grid and shift the other columns. */
  .topbar > .nav-feed,
  .topbar > .nav-marketplace {
    position: absolute;
    top: 0; bottom: 0;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
  }
  .topbar > .nav-feed        { left: 25%; }
  .topbar > .nav-marketplace { left: 75%; }
  .topbar .title-group {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .topbar .title { letter-spacing: 0.08em; }
  .topbar .stats {
    color: var(--fg);
    letter-spacing: 0.04em;
  }
  .topbar .stats span { color: var(--fg); margin-right: 4px; }
  .topbar nav { display: flex; gap: 18px; align-items: center; }
  .topbar .nav-middle { }
  .topbar .nav-right  { }
  /* Nav labels (SPRAWL title, FEED, AUTHORS, ENTITIES, ARCS, MARKETPLACE,
     ABOUT, SKILL, CONNECT, DARK) render in --mute so they sit quietly
     against the page background. The stats block on the left keeps
     var(--fg) (set above) because it's actual content, not navigation.
     Hover: lift to --fg and keep the default underline — both cues
     together make it clear the item is clickable. */
  .topbar .title { color: var(--mute); }
  .topbar nav a  { color: var(--fg); }
  /* Chip-style hover: a solid --hl background wraps the label and the
     text flips to --bg. Padding + equal negative margin keeps the outer
     bounds the same so neighbouring items don't shift. The default
     a:hover underline still applies, so destination links read as both
     "button chip" AND "link". */
  .topbar .title:hover,
  .topbar nav a:hover {
    background: var(--hl);
    color: var(--bg);
    padding: 2px 6px;
    margin: -2px -6px;
  }

  /* Desktop: the wrapper is invisible to layout. Its three children are
     absolute-positioned relative to .panel exactly as they were before
     the wrapper existed. `display: contents` is well-supported in all
     modern engines; the only tradeoff is it drops the element from the
     accessibility tree, which is fine for a semantically empty div. */
  .panel-header { display: contents; }

  /* --- Mobile hamburger + dropdown nav ----------------------------------
     On desktop these stay out of the way. On narrow viewports we hide the
     scattered desktop nav groups and surface a single hamburger that
     reveals a vertical list of every link. Kept scoped to the homepage
     for now — will roll out to other pages once this pattern settles. */
  .nav-hamburger {
    /* !important because Safari's <button> UA style otherwise leaks
       through in edge cases (empty buttons with only absolute-positioned
       children were rendering as a full-width grid item). */
    display: none !important;
    background: transparent;
    border: 0;
    padding: 0;
    margin: 0;
    cursor: pointer;
    justify-self: end;
    width: 22px;
    height: 16px;
    position: relative;
  }
  .nav-hamburger > span {
    position: absolute;
    left: 0;
    right: 0;
    height: var(--rule);
    background: var(--fg);
    transition: transform 160ms ease, opacity 120ms ease, top 160ms ease;
  }
  .nav-hamburger > span:nth-child(1) { top: 0;  }
  .nav-hamburger > span:nth-child(2) { top: 50%; transform: translateY(-50%); }
  .nav-hamburger > span:nth-child(3) { top: calc(100% - var(--rule)); }
  /* Open state — lines morph into an X. */
  .nav-hamburger.is-open > span:nth-child(1) { top: 50%; transform: translateY(-50%) rotate(45deg); }
  .nav-hamburger.is-open > span:nth-child(2) { opacity: 0; }
  .nav-hamburger.is-open > span:nth-child(3) { top: 50%; transform: translateY(-50%) rotate(-45deg); }

  /* Mobile dropdown nav. Default state is hidden (display: none); adding
     the .is-open class flips it to display: flex. Class-based toggle
     keeps specificity predictable and avoids the tie between
     `.nav-mobile { display: flex }` and `.nav-mobile[hidden] { display: none }`
     that some Safari versions have resolved in the wrong order. */
  .nav-mobile {
    display: none;
    position: fixed;
    top: var(--topbar-h);
    left: 0;
    right: 0;
    background: var(--bg);
    flex-direction: column;
    gap: 14px;
    padding: 18px var(--pad);
    border-bottom: var(--rule) solid var(--fg);
    z-index: 19;          /* below .topbar (z:20), above content */
    letter-spacing: 0.04em;
  }
  .nav-mobile.is-open { display: flex; }
  .nav-mobile a { display: block; padding: 2px 0; }

  @media (max-width: 720px) {
    /* Stats on mobile: keep SPRAWL + the counts, just tighten the gap so
       it doesn't push into the hamburger. */
    .topbar { grid-template-columns: 1fr auto; }
    .topbar .title-group { gap: 12px; }
    .topbar .stats { font-size: 12px; }

    /* Hide every desktop nav group; hamburger takes over. */
    .topbar > .nav-middle,
    .topbar > .nav-feed,
    .topbar > .nav-marketplace,
    .topbar > .nav-right { display: none; }

    .nav-hamburger { display: inline-block !important; }
  }

  /* Two-column layout: text on the left, tree on the right. Entities used
     to live in a third column; they're now hover-tooltips on the text. */
  .layout {
    position: fixed;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    display: grid;
    grid-template-columns: 50% 50%;
  }
  /* Vertical rule between the panels is a ::after overlay (not a border)
     for the same reason as the topbar — boot animation draws it top→down.
     z-index: 3 puts it above the opaque controls-band ::before (z:1) and
     the controls buttons themselves (z:2). */
  .panel {
    overflow: auto;
    padding: var(--pad);
    position: relative;
  }
  .panel::after {
    content: "";
    position: absolute;
    top: 0; bottom: 0; right: 0;
    width: var(--rule);
    background: var(--fg);
    z-index: 3;
  }
  .panel:last-child::after { display: none; }

  /* The text panel is restructured so its controls can stay pinned while the
     reading content scrolls below them. */
  #text-panel {
    overflow: hidden;
    padding: 0;
  }
  /* Opaque band covering the top controls row so scrolling text never bleeds
     through behind the buttons, plus a thin rule under it so the controls
     row is clearly separated from the content. Sits between the scroll
     content (z-index: 0) and the controls (z-index: 2). */
  #text-panel::before,
  #tree-panel::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: var(--controls-h);
    background: var(--bg);
    border-bottom: var(--rule) solid var(--fg);
    z-index: 1;
    pointer-events: none;
  }
  #text-panel .panel-scroll {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: auto;
    padding: var(--pad);
    /* reserve space for the controls band plus extra breathing room so the
       reading content doesn't sit flush against the divider rule */
    padding-top: calc(var(--controls-h) + var(--pad));
    /* Scrolling works, the scrollbar itself is hidden. */
    scrollbar-width: none;            /* Firefox */
    /* Disable browser scroll-anchoring so our explicit scrollTop math isn't
       competing with Chrome's/Firefox's auto-preservation heuristic. */
    overflow-anchor: none;
  }
  #text-panel .panel-scroll::-webkit-scrollbar { display: none; } /* WebKit */
  .panel-controls {
    position: absolute;
    top: 0;
    right: var(--pad);
    height: var(--controls-h);
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 2;
    background: var(--bg);
    padding-left: 8px;   /* tiny gutter so content underneath doesn't touch */
  }
  .panel-controls.panel-controls-left {
    right: auto;
    left: var(--pad);
    padding-left: 0;
    padding-right: 8px;
  }
  /* Middle readout in the tree panel — the currently highlighted node's
     meta line. Sits on the same row as the reset/random and ⛶ controls. */
  .panel-controls.panel-controls-center {
    position: absolute;
    top: 0;
    height: var(--controls-h);
    display: flex;
    align-items: center;
    left: 50%;
    right: auto;
    transform: translateX(-50%);
    background: var(--bg);
    /* Default to --mute so the tree-panel's #id readout reads as quieter
       than the text column's content. The text-panel center (tts-global
       PAUSE button) already overrides with its own .ctl + .is-pause
       colours, so changing the container default doesn't affect it. */
    color: var(--mute);
    letter-spacing: 0.04em;
    padding: 0;
    z-index: 2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 60%;
  }
  .ctl { cursor: pointer; user-select: none; color: var(--mute); }
  /* Panel-controls buttons (HIDE INFO, EXPAND, RESET, RANDOM, the tts
     global PAUSE/PLAY) are actions, not destination links. Hover lifts
     them from mute grey to full foreground instead of underlining. */
  /* Same chip-style hover as the topbar nav: solid --hl background,
     --bg text. Padding + negative margin prevents layout shift inside
     the flex row of .panel-controls. */
  .ctl:hover {
    text-decoration: none;
    background: var(--hl);
    color: var(--bg);
    padding: 2px 6px;
    margin: -2px -6px;
  }
  .ctl-sep { user-select: none; color: var(--mute); }
  /* Path stats readout on the left of the text panel's control row. Grey
     and quiet, matching the other readouts/buttons. */
  #text-path-stats { color: var(--fg); letter-spacing: 0.04em; }

  /* The #id in the tree panel's top band is clickable — readers can click
     it to type any id and jump. Cursor hint + invisible underline match
     the other link styling on the page. */
  #tree-node-info .id-jump { cursor: pointer; }
  /* #id is an action button (click to type/jump to a different link),
     not a destination link. Chip-style hover matches the topbar nav
     and panel-controls buttons: solid --hl background, --bg text,
     no underline. Padding + equal negative margin keeps neighbouring
     content from shifting. */
  #tree-node-info .id-jump:hover {
    text-decoration: none;
    background: var(--hl);
    color: var(--bg);
    padding: 2px 6px;
    margin: -2px -6px;
  }
  #tree-node-info input.id-jump-input {
    background: transparent;
    border: none;
    border-bottom: var(--rule) solid var(--fg);
    color: var(--fg);
    font: inherit;
    letter-spacing: inherit;
    text-align: center;
    width: 80px;
    outline: none;
    padding: 0 2px;
  }

  /* (h2 headings are no longer used in the panels; kept no styles here.) */

  /* Text panel */
  .meta {
    color: var(--mute);   /* the one place grey is allowed */
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  .text-body {
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  /* Entity references are shown with literal brackets in the prose
     (rendered by renderLinkText) so the markup itself is the visual
     cue — no bold, no underline. The span still carries data-entity
     for the tooltip + navigation handler. */
  .text-body .entity { cursor: pointer; }
  /* Link blocks flow as one continuous reading. No borders, no extra padding
     between passages — just one line-height of breathing room so the meta
     stays associated with the passage it opens. The background transition
     is so the selected-cell tint fades in (and out) smoothly instead of
     snapping — matters most at the end of the boot sequence, when the
     highlight lands after the text has finished writing itself. */
  /* Every link-block shares the same padding + negative horizontal
     margins so state changes (hover, select) are pure background swaps
     and never shift layout. Vertical padding is 0.75em top and bottom
     — exactly half the 1.5em line-height — and the margin between
     adjacent blocks is zero. That way two neighbouring highlighted
     cells' backgrounds meet edge-to-edge with no gap, while the
     reading rhythm (text-to-text distance = 1.5em) is unchanged. */
  .link-block {
    margin: 0 calc(-1 * var(--pad));
    padding: 0.75em var(--pad);
  }
  .link-block .meta {
    margin: 0 0 4px 0;
    cursor: pointer;
  }
  /* Destinations in the meta line — #id (re-selects the link), the
     author name (→ author page), and the COLLECTED BY owner (→ owner
     page). On hover they underline AND lift to --hl (the accent colour)
     so the reader knows they're clickable. */
  .link-block .meta .meta-id:hover,
  .link-block .meta a:not(.act-play):not(.act-vote):not(.act-collect):hover {
    text-decoration: underline;
    color: var(--hl);
  }
  /* Per-link action affordances (LISTEN / VOTE / COLLECT) are buttons,
     not destinations. Override the default a:hover underline with a
     colour change from mute to the accent. */
  .link-block .meta .act-play:hover,
  .link-block .meta .act-vote:hover,
  .link-block .meta .act-collect:hover {
    text-decoration: none;
    color: var(--hl);
  }
  /* Selected (clicked) block — clear tint. Hovering any non-selected
     block gets a lighter tint so it reads as "this is what your cursor
     is over, not your current choice". */
  /* Active state — hovering the cell, hovering its matching tree node
     (.hover class set by JS so hover-on-graph lights up the cell too),
     and selecting all apply the same inversion: --fg background, --bg
     body prose, --mute meta line, --bg when an item inside the meta
     line is hovered. All scoped to body:not(.boot) so no highlight
     kicks in until the initial tree + text wipes have finished — the
     reader sees the content settle first, then interactions activate. */
  body:not(.boot) :is(.link-block:hover, .link-block.hover, .link-block.selected) {
    background: var(--hl);
    color: var(--bg);
  }
  body:not(.boot) :is(.link-block:hover, .link-block.hover, .link-block.selected) .text-body {
    color: var(--bg);
  }
  body:not(.boot) :is(.link-block:hover, .link-block.hover, .link-block.selected) .meta,
  body:not(.boot) :is(.link-block:hover, .link-block.hover, .link-block.selected) .meta a,
  body:not(.boot) :is(.link-block:hover, .link-block.hover, .link-block.selected) .meta .meta-id {
    color: var(--mute);
  }
  body:not(.boot) :is(.link-block:hover, .link-block.hover, .link-block.selected) .meta .meta-id:hover,
  body:not(.boot) :is(.link-block:hover, .link-block.hover, .link-block.selected) .meta a:not(.act-play):not(.act-vote):not(.act-collect):hover,
  body:not(.boot) :is(.link-block:hover, .link-block.hover, .link-block.selected) .meta .act-play:hover,
  body:not(.boot) :is(.link-block:hover, .link-block.hover, .link-block.selected) .meta .act-vote:hover,
  body:not(.boot) :is(.link-block:hover, .link-block.hover, .link-block.selected) .meta .act-collect:hover {
    color: var(--bg);
  }

  /* --- Narration (sprawl-tts.js) --------------------------------------
     While a link is being narrated, its body is re-rendered with each
     word wrapped in <span class="tts-word">. Default state is hidden;
     the tick loop in sprawl-tts.js adds .speaking when the voice reaches
     each word and .spoken after it passes. Both map to visible, so the
     prose "writes itself in" as the narrator speaks.
     Using opacity (not display/visibility-hidden-with-layout) keeps
     layout stable — the full passage reserves its final size up front,
     so revealing a word doesn't shift anything on-screen. The rendered-
     text override is temporary; stopping narration (or finishing a
     link) restores the original .text-body HTML, including the entity
     underlines. */
  .tts-word { opacity: 0; transition: opacity 180ms ease-out; }
  .tts-word.spoken,
  .tts-word.speaking { opacity: 1; }
  .act-play { cursor: pointer; }
  /* PAUSE state of the per-link button and the centred global button.
     Audible narration is in progress; clicking interrupts it. We surface
     that with full-strength colour (var(--fg)) instead of the mute grey
     every other control uses. */
  .act-play.is-pause,
  #tts-global.is-pause { color: var(--fg); }
  /* Audiogram next to the global PAUSE button — three short vertical
     bars that pulse while audio is playing. Heights are driven from JS
     (sprawl-tts.js) by summing non-harmonic sine waves per bar, so the
     motion looks organic and never loops visibly. Centred vertically
     against the PAUSE text; em units let the bars track font scaling. */
  #tts-bars {
    display: none;
    align-items: flex-end;   /* bars anchor at baseline, grow upward */
    gap: 2px;
    height: 1em;
    margin-left: 8px;
    line-height: 1;
  }
  #tts-global.is-pause + #tts-bars { display: inline-flex; }
  #tts-bars > span {
    display: block;
    width: 2px;
    height: 0.2em;
    background: var(--fg);
    transition: height 60ms linear;
  }

  /* Tree panel — the wrap starts below the controls band so the top of the
     tree never sits under the reset/random/expand buttons. */
  #tree-wrap {
    position: absolute;
    top: var(--controls-h); left: 0; right: 0; bottom: 0;
  }
  svg { width: 100%; height: 100%; display: block; }

  /* Edges and node stroke widths are derived at render time from the tree
     density (see computeScale in JS) and injected as CSS variables on the
     SVG element. --stroke is the default width; in-path elements use 1.5x. */
  svg { --stroke: 1.5; }

  /* Tree colouring: non-path elements stroke in --mute (the mid-teal),
     path/selected/hover elements stroke in --fg (the near-black). The
     old opacity-based dim is gone — distinct colours read clearer and
     don't wash out against the tinted page background. */
  /* Edges + nodes + recap-rings that are on the selected ancestry path
     (in-path) use --fg — same colour as the main text, so the path
     blends visually with the prose. The *highlighted* element (the
     clicked node, or whichever node the reader is hovering) uses --hl,
     standing out against the rest of the path. */
  svg .edge { stroke: var(--tr); stroke-width: var(--stroke); fill: none; }
  svg .edge.in-path {
    stroke: var(--fg);
    stroke-width: calc(var(--stroke) * 2);
  }

  svg .node {
    stroke: var(--tr);
    stroke-width: var(--stroke);
    fill: var(--bg);
    /* The 0.4s fade smooths the boot-end reveal, when body.boot is
       removed and the selected node's fill flips from var(--bg) to
       var(--hl). After boot the transition below strips the animation
       so hover/click responses feel instant. */
    transition: fill 0.4s ease-out;
  }
  body:not(.boot) svg .node { transition: none; }
  svg .node.in-path {
    stroke: var(--fg);
    stroke-width: calc(var(--stroke) * 2);
  }
  /* Selected and hover-highlight rules come AFTER .in-path so that a
     selected node that is also in-path picks up the --hl fill/stroke
     instead of the path's --fg (CSS same-specificity, later-wins). */
  svg .node.selected { fill: var(--hl); stroke: var(--hl); }
  svg .node.hover-highlight { fill: var(--hl); stroke: var(--hl); }

  svg .recap-ring {
    stroke: var(--tr);
    stroke-width: var(--stroke);
    fill: none;
  }
  svg .recap-ring.in-path {
    stroke: var(--fg);
    stroke-width: calc(var(--stroke) * 2);
  }

  svg .node-hit { fill: transparent; cursor: pointer; }
  /* When the user isn't hovering a node, the SVG itself is grabbable for
     pan. The cursor switches to grabbing via JS during an active drag. */
  svg { cursor: grab; }
  svg .node-hit:hover ~ *, svg .node-hit:hover { cursor: pointer; }

  /* --- Expanded modes: one column at a time fills the viewport. The two
     modes are mutually exclusive (JS toggles make sure of that). */
  body.expanded .layout,
  body.tree-expanded .layout {
    grid-template-columns: 1fr;
  }
  body.expanded #tree-panel { display: none; }
  body.tree-expanded #text-panel { display: none; }

  /* --- Hide-meta mode: a clean reading view. Suppresses the grey link
     header lines, the entity underlines, and (via JS) the hover tooltip. */
  body.hide-meta .link-block .meta { display: none; }
  body.hide-meta .text-body .entity { cursor: inherit; }

  /* In expanded mode, the reading column is much wider than it needs to be,
     so cap the reading width and center it for a comfortable line length. */
  body.expanded #text-content {
    max-width: 820px;
    margin: 0 auto;
  }

  .empty { /* black like everything else */ }

  /* Entity hover tooltip */
  #entity-tooltip {
    position: fixed;
    background: var(--bg);
    color: var(--fg);
    border: var(--rule) solid var(--fg);
    padding: 8px 10px;
    max-width: 360px;
    pointer-events: none;
    display: none;
    z-index: 30;
    line-height: var(--line-height);
  }
  #entity-tooltip.visible { display: block; }
  #entity-tooltip .tip-head { margin-bottom: 4px; }
  #entity-tooltip .tip-type { color: var(--mute); margin-left: 8px; letter-spacing: 0.04em; }

  /* ==========================================================================
     Boot choreography.
     `body.boot` is present from page-render time (set in the HTML) and the
     JS boot sequence removes it once the staggered animations have had
     time to finish. Everything that wants to animate in on first paint is
     scoped under `body.boot`, so subsequent re-renders (clicking around,
     resize, etc.) never replay these animations — the elements simply
     inherit their default (final) state.

     Stagger inputs come from JS:
       - `--depth`        set on every SVG node + edge (by renderTree)
       - `--length`       set on every SVG edge (the line's pixel length,
                          used for the stroke-dash drawing trick)
       - `--block-index`  set on every .link-block in the text column
                          (by renderText; oldest ancestor = 0)

     The sequence roughly runs:
       0.0s  topbar rule sweeps in (left→right)
       0.15s panel divider draws down (top→bottom)
       0.2s  title/nav groups fade in, staggered
       0.5s  panel controls fade in
       ~0.8s tree nodes + edges cascade in by depth (data has arrived by now)
       ~1.2s text blocks cascade in, meta fade → body wipe-down
     ========================================================================== */

  @keyframes drawH     { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes drawV     { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  @keyframes fadeIn    { from { opacity: 0; }          to { opacity: 1; } }
  @keyframes drawLine  { to   { stroke-dashoffset: 0; } }
  @keyframes wipeDown  { from { clip-path: inset(0 0 100% 0); } to { clip-path: inset(0 0 0 0); } }

  /* Topbar bottom rule and panel divider draw in from their anchors. */
  body.boot .topbar::after {
    transform: scaleX(0);
    transform-origin: left center;
    animation: drawH 0.5s ease-out forwards;
  }
  body.boot .panel::after {
    transform: scaleY(0);
    transform-origin: top center;
    animation: drawV 0.6s ease-out 0.15s forwards;
  }

  /* Titles, stats, nav groups, and panel controls fade in with a small
     stagger. Grouped so the fade order traces the reader's eye from the
     left-hand SPRAWL wordmark rightward across the bar. */
  body.boot .topbar .title-group,
  body.boot .topbar .nav-middle,
  body.boot .topbar .nav-feed,
  body.boot .topbar .nav-marketplace,
  body.boot .topbar .nav-right,
  body.boot .panel-controls {
    opacity: 0;
    animation: fadeIn 0.4s ease-out forwards;
  }
  body.boot .topbar .title-group    { animation-delay: 0.2s;  }
  body.boot .topbar .nav-middle     { animation-delay: 0.3s;  }
  body.boot .topbar .nav-feed       { animation-delay: 0.35s; }
  body.boot .topbar .nav-marketplace{ animation-delay: 0.4s;  }
  body.boot .topbar .nav-right      { animation-delay: 0.45s; }
  body.boot .panel-controls         { animation-delay: 0.5s;  }

  /* Tree edges draw themselves in by depth via stroke-dashoffset; nodes
     fade in on the same cadence. Small base delay so the topbar rule
     finishes first. 20ms per depth keeps even a 40-deep tree under 1s. */
  body.boot svg .edge {
    stroke-dasharray: var(--length);
    stroke-dashoffset: var(--length);
    animation: drawLine 0.25s ease-out calc(var(--depth, 0) * 20ms) forwards;
  }
  body.boot svg .node {
    opacity: 0;
    animation: fadeIn 0.2s ease-out calc(var(--depth, 0) * 20ms + 50ms) forwards;
  }

  /* Text column: every link-block's meta line fades in, then its body
     wipes down like text being typed/generated. Stagger is per-block
     so the reader sees the ancestry materialize top→down, oldest first. */
  body.boot .link-block .meta {
    opacity: 0;
    animation: fadeIn 0.3s ease-out calc(var(--block-index, 0) * 35ms) forwards;
  }
  body.boot .link-block .text-body {
    clip-path: inset(0 0 100% 0);
    animation: wipeDown 0.45s ease-out calc(var(--block-index, 0) * 35ms + 120ms) forwards;
  }

  /* During boot, the selected tree node holds its unfilled state so it
     doesn't pre-empt the fade-in animation. The link-block inversion is
     already gated on body:not(.boot) above, so no equivalent rule is
     needed for the text column. */
  body.boot svg .node.selected,
  body.boot svg .node.hover-highlight { fill: var(--bg); }

  /* Hide the initial "loading…" placeholder in the text column during
     boot so it doesn't flash before the first link-block wipes in. Once
     body.boot is removed at 3.5s, the placeholder (if somehow still
     visible due to a slow fetch) becomes visible again. */
  body.boot .boot-loading { opacity: 0; }

  /* --- Mobile layout override ----------------------------------------
     Placed at the END of the stylesheet so it wins against the default
     `.layout { position: fixed ... grid-template-columns: 50% 50% }`
     (same selector, later source position wins ties).

     On mobile the desktop's "two pinned viewport-height panels with
     internal scroll" model breaks — too cramped, awkward to read.
     Instead the page flows as a normal scrolling document: the tree
     on top as a navigational overview, the full text below. Topbar
     stays fixed at top; everything else scrolls. */
  @media (max-width: 720px) {
    /* Let the document scroll. Desktop locks html/body to viewport
       height with overflow:hidden because each panel scrolls
       internally; on mobile we want the whole page to scroll as one. */
    html, body {
      height: auto;
      overflow: visible;
    }

    .layout {
      position: static;
      display: flex;
      flex-direction: column;
      padding-top: var(--topbar-h);   /* clear the fixed topbar */
    }
    #tree-panel { order: 1; }         /* tree above */
    #text-panel { order: 2; }         /* text below */

    /* Panels drop their fixed-viewport behaviour — no internal scroll,
       no clipping; they grow to fit their own content. */
    .panel       { overflow: visible; }
    #text-panel  { overflow: visible; }

    /* The text panel's .panel-scroll goes from absolute-filling its
       parent to natural flow. Padding-top already reserves space below
       the controls band via the desktop rule, so nothing overlaps. */
    #text-panel .panel-scroll {
      position: static;
      overflow: visible;
    }

    /* The tree wrap was absolute (top:controls-h, bottom:0). With the
       panel in natural flow, give it an explicit height so the tree
       stays a bounded overview instead of stretching to fit every
       branch. Kept short enough on portrait mobile that clicking a
       node leaves visible room below for the selected link's text to
       show. margin-top clears the absolute-positioned panel-controls
       band at the top of the panel. */
    #tree-wrap {
      position: static;
      top: auto;
      height: 38vh;
      min-height: 240px;
      margin-top: var(--controls-h);
    }

    /* Separator flips from a right-side vertical rule to a bottom
       horizontal rule on the tree panel (which is now on top). */
    .panel::after { display: none; }
    #tree-panel   { border-bottom: var(--rule) solid var(--fg); }

    /* Keep the meta line on a single row even when it overflows the
       column width — the reader scrolls horizontally inside the line
       instead of seeing it wrap. Scrollbar hidden for aesthetics (the
       swipe gesture still works). touch-action must list BOTH axes
       (`pan-x pan-y`): `pan-x` alone claims the gesture on the row so
       vertical swipes starting on a meta line can't bubble up to scroll
       the page. Allowing both lets iOS pick per-gesture — horizontal
       pans the line, vertical pans the page. */
    .link-block .meta {
      white-space: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      touch-action: pan-x pan-y;
      scrollbar-width: none;
    }
    .link-block .meta::-webkit-scrollbar { display: none; }

    /* EXPAND buttons are desktop-only affordances (each one toggles its
       column to take the full viewport). On mobile the whole page already
       scrolls and the notion of "expanded" no longer applies. Hide the
       now-stranded separator between HIDE INFO and the (hidden) EXPAND
       in the text panel. */
    #toggle-expand,
    #toggle-tree-expand { display: none; }
    #text-panel .panel-controls .ctl-sep { display: none; }

    /* Mobile: the three control groups ride a 3-column grid inside the
       panel header so the center group lands midway between the left
       and right groups instead of at the viewport midpoint (which
       looked off-balance when the left stats were wider than HIDE INFO).
       grid-template-columns: auto 1fr auto makes col 2 the literal gap
       between col 1 and col 3, and justify-self: center on the center
       element centers it inside that gap. */
    .panel-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: var(--controls-h);
      padding: 0 var(--pad);
      z-index: 2;
      background: var(--bg);
      column-gap: 8px;
    }
    .panel-header > .panel-controls {
      position: static;
      top: auto;
      left: auto;
      right: auto;
      transform: none;
      padding: 0;
      background: transparent;
    }
    .panel-header > .panel-controls-left   { justify-self: start;  }
    .panel-header > .panel-controls-center { justify-self: center; }
    .panel-header > .panel-controls:not(.panel-controls-left):not(.panel-controls-center) {
      justify-self: end;
    }
  }</style>
