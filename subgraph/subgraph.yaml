specVersion: 1.2.0
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: Sprawl
    network: sepolia
    source:
      address: "0x3afd162d985db8215d8662f597428fa71fedba25"
      abi: Sprawl
      startBlock: 10691928
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Citizen
        - CollectedAsset
        - AssetKeyLookup
        - Sale
        - Listing
        - ProtocolStats
      abis:
        - name: Sprawl
          file: ./abis/Sprawl.json
      eventHandlers:
        - event: CitizenRegistered(indexed address,string)
          handler: handleCitizenRegistered
        - event: CitizenRenamed(indexed address,string)
          handler: handleCitizenRenamed
        - event: CitizenBanned(indexed address)
          handler: handleCitizenBanned
        - event: CitizenUnbanned(indexed address)
          handler: handleCitizenUnbanned

        - event: LinkCollected(indexed uint256,indexed address,indexed address,uint256,bool,uint256,uint256,uint256)
          handler: handleLinkCollected
        - event: EntityCollected(indexed bytes32,string,indexed address,indexed address,uint256)
          handler: handleEntityCollected
        - event: ArcCollected(indexed bytes32,string,indexed uint256,address,address,uint256)
          handler: handleArcCollected

        - event: Listed(indexed uint8,indexed bytes32,indexed address,uint256)
          handler: handleListed
        - event: Unlisted(indexed uint8,indexed bytes32,indexed address)
          handler: handleUnlisted
        - event: Sold(indexed uint8,indexed bytes32,indexed address,address,uint256,bool,uint256,uint256)
          handler: handleSold

        - event: LinkCleared(indexed uint256)
          handler: handleLinkCleared
        - event: EntityCleared(indexed bytes32)
          handler: handleEntityCleared
        - event: ArcCleared(indexed bytes32)
          handler: handleArcCleared

        - event: FirstSalePriceChanged(uint256)
          handler: handleFirstSalePriceChanged
        - event: OperatorChanged(indexed address,indexed address)
          handler: handleOperatorChanged

      file: ./src/mapping.ts
